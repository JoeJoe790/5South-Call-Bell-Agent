<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>Fixed Nurse Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        #video-container { position: relative; flex: 1; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        #scan-box { position: absolute; border: 4px solid #ff3b30; border-radius: 8px; pointer-events: none; box-shadow: 0 0 15px rgba(255,59,48,0.5); z-index: 5; }

        #dashboard { height: 45vh; background: #000; border-top: 2px solid #333; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; position: relative; }
        #room-display { font-weight: 900; color: #28cd41; text-align: center; width: 100%; line-height: 1; }
        #timer-display { font-size: 1.2rem; color: #ffcc00; margin-top: 10px; font-weight: bold; min-height: 1.5rem; }
        #status-light { font-size: 0.7rem; color: #444; position: absolute; bottom: 5px; right: 10px; }

        #settings-menu { position: fixed; right: -320px; top: 0; width: 280px; height: 100%; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); z-index: 100; transition: 0.3s; padding: 20px; border-left: 1px solid rgba(255,255,255,0.2); overflow-y: auto; }
        #settings-menu.open { right: 0; }
        .setting-row { margin-bottom: 15px; display: flex; flex-direction: column; }
        .slider-group { display: flex; align-items: center; gap: 10px; margin-top: 5px; }
        .label-text { font-size: 0.7rem; color: #00e5ff; font-weight: bold; text-transform: uppercase; width: 80px; }
        input[type=range] { flex: 1; }

        #menu-toggle { position: absolute; top: 10px; right: 10px; background: rgba(51,51,51,0.6); color: #fff; border: 1px solid #777; padding: 10px 15px; border-radius: 8px; font-weight: bold; z-index: 101; }
        #startBtn { background: #28cd41; color: white; border: none; padding: 20px 40px; border-radius: 12px; font-size: 1.5rem; font-weight: bold; z-index: 200; }
        .close-btn { background: #007aff; width: 100%; padding: 12px; border: none; color: white; border-radius: 8px; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="video-container">
        <video id="video" autoplay playsinline></video>
        <div id="scan-box"></div>
        <button id="menu-toggle">⚙️ ADJUST</button>
    </div>

    <div id="dashboard">
        <button id="startBtn">START SYSTEM</button>
        <div id="room-display"></div>
        <div id="timer-display"></div>
        <div id="status-light">Scanner Idle</div>
    </div>

    <div id="settings-menu">
        <h3 style="margin-top:0; color:#28cd41;">Calibration</h3>
        <div class="setting-row">
            <div class="slider-group"><span class="label-text">Width</span><input type="range" id="boxW" min="50" max="450" value="220"></div>
            <div class="slider-group"><span class="label-text">Height</span><input type="range" id="boxH" min="30" max="350" value="100"></div>
        </div>
        <div class="setting-row">
            <div class="slider-group"><span class="label-text">Horizontal</span><input type="range" id="boxX" min="-45" max="45" value="0"></div>
            <div class="slider-group"><span class="label-text">Vertical</span><input type="range" id="boxY" min="-45" max="45" value="0"></div>
        </div>
        <div class="setting-row">
            <label style="font-size: 0.7rem; color: #ffcc00;">REPEAT EVERY: <span id="repLabel">2m</span></label>
            <input type="range" id="repSlider" min="1" max="15" value="2">
        </div>
        <div class="setting-row">
            <label style="font-size: 0.7rem;">VOICE & VOLUME</label>
            <select id="voiceSelect" style="background:rgba(0,0,0,0.5); color:white; border:1px solid #777; padding:5px; margin-bottom:10px;"></select>
            <div class="slider-group"><span class="label-text">Vol</span><input type="range" id="vol" min="0" max="1" step="0.1" value="1"></div>
        </div>
        <button id="testBtn" style="width:100%; background:rgba(255,255,255,0.1); color:white; padding:10px; border:1px solid #fff; border-radius:8px;">Test Sound</button>
        <button class="close-btn" onclick="toggleMenu()">BACK TO SCREEN</button>
    </div>

    <script>
        const video = document.getElementById('video');
        const startBtn = document.getElementById('startBtn');
        const roomDisplay = document.getElementById('room-display');
        const timerDisplay = document.getElementById('timer-display');
        const statusLight = document.getElementById('status-light');
        const menu = document.getElementById('settings-menu');
        const boxW = document.getElementById('boxW'), boxH = document.getElementById('boxH');
        const boxX = document.getElementById('boxX'), boxY = document.getElementById('boxY');
        const scanBox = document.getElementById('scan-box');
        
        let synth = window.speechSynthesis;
        let activeRooms = []; let lastSet = ""; let timeLeft = 0;

        function toggleMenu() { menu.classList.toggle('open'); }
        document.getElementById('menu-toggle').onclick = toggleMenu;

        const updateBox = () => {
            scanBox.style.width = boxW.value + 'px';
            scanBox.style.height = boxH.value + 'px';
            scanBox.style.left = `calc(50% + ${boxX.value}% - ${boxW.value/2}px)`;
            scanBox.style.top = `calc(50% + ${boxY.value}% - ${boxH.value/2}px)`;
        };
        [boxW, boxH, boxX, boxY].forEach(el => el.oninput = updateBox);
        updateBox();

        document.getElementById('repSlider').oninput = (e) => { 
            document.getElementById('repLabel').innerText = e.target.value + 'm'; 
        };

        function loadVoices() {
            document.getElementById('voiceSelect').innerHTML = synth.getVoices().map(v => `<option value="${v.name}">${v.name}</option>`).join('');
        }
        synth.onvoiceschanged = loadVoices; loadVoices();

        startBtn.onclick = async () => {
            const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
            video.srcObject = s;
            startBtn.style.display = 'none';
            statusLight.innerText = "Scanner Active";
            startScanning();
            setInterval(tick, 1000);
        };

        async function startScanning() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            setInterval(async () => {
                if (!video.videoWidth) return;
                
                // FIXED MATH: Mapping Screen % to Camera Pixels
                const scaleX = video.videoWidth / video.clientWidth;
                const scaleY = video.videoHeight / video.clientHeight;
                
                const w = boxW.value * scaleX;
                const h = boxH.value * scaleY;
                
                const x = (video.videoWidth / 2) + (boxX.value / 100 * video.videoWidth) - (w / 2);
                const y = (video.videoHeight / 2) + (boxY.value / 100 * video.videoHeight) - (h / 2);

                canvas.width = w; canvas.height = h;
                ctx.drawImage(video, x, y, w, h, 0, 0, w, h);
                
                statusLight.style.color = "#00e5ff";
                const { data: { text } } = await Tesseract.recognize(canvas, 'eng');
                statusLight.style.color = "#444";

                const found = (text.match(/\d{4}/g) || [])
                    .map(n => n.substring(2))
                    .filter((v, i, a) => a.indexOf(v) === i && parseInt(v) <= 60)
                    .sort();
                
                if (found.length > 0) {
                    activeRooms = found;
                    updateDisplay();
                    if (activeRooms.join(",") !== lastSet) { 
                        lastSet = activeRooms.join(",");
                        announce(); 
                        timeLeft = document.getElementById('repSlider').value * 60; 
                    }
                } else {
                    roomDisplay.innerText = ""; 
                    timerDisplay.innerText = ""; 
                    lastSet = "";
                    timeLeft = 0;
                    activeRooms = [];
                }
            }, 1000);
        }

        function updateDisplay() {
            const count = activeRooms.length;
            if (count === 1) roomDisplay.style.fontSize = "12rem";
            else if (count === 2) roomDisplay.style.fontSize = "8rem";
            else roomDisplay.style.fontSize = "5rem";
            roomDisplay.innerText = activeRooms.join("  ");
        }

        function announce() {
            if (activeRooms.length === 0) return;
            synth.cancel();
            let msg = activeRooms.length === 1 ? "Room " + activeRooms[0] : "Rooms " + activeRooms.slice(0,-1).join(", ") + " and " + activeRooms.slice(-1);
            const ut = new SpeechSynthesisUtterance(msg);
            const selectedVoice = synth.getVoices().find(v => v.name === document.getElementById('voiceSelect').value);
            if(selectedVoice) ut.voice = selectedVoice;
            ut.volume = document.getElementById('vol').value;
            synth.speak(ut);
        }

        function tick() {
            if (activeRooms.length > 0) {
                if (timeLeft <= 0) {
                    announce();
                    timeLeft = document.getElementById('repSlider').value * 60;
                } else {
                    timeLeft--;
                    timerDisplay.innerText = `REPEATING IN: ${Math.floor(timeLeft/60)}m ${timeLeft%60}s`;
                }
            }
        }

        document.getElementById('testBtn').onclick = () => {
            const ut = new SpeechSynthesisUtterance("Audio Working");
            ut.volume = document.getElementById('vol').value;
            synth.speak(ut);
        };
    </script>
</body>
</html>
