<script>
const video = document.getElementById('video');
const startBtn = document.getElementById('startBtn');
const roomDisplay = document.getElementById('room-display');
const timerDisplay = document.getElementById('timer-display');
const statusLight = document.getElementById('status-light');
const menu = document.getElementById('settings-menu');
const boxW = document.getElementById('boxW'), boxH = document.getElementById('boxH');
const boxX = document.getElementById('boxX'), boxY = document.getElementById('boxY');
const scanBox = document.getElementById('scan-box');

let synth = window.speechSynthesis;
let activeRooms = [];
let lastSet = "";
let timeLeft = 0;

// NEW: stability + cooldown
let lastDetectedTime = 0;
let lastSpoken = 0;

function toggleMenu() { menu.classList.toggle('open'); }
document.getElementById('menu-toggle').onclick = toggleMenu;

// Scan box UI
const updateBox = () => {
    scanBox.style.width = boxW.value + 'px';
    scanBox.style.height = boxH.value + 'px';
    scanBox.style.left = `calc(50% + ${boxX.value}% - ${boxW.value/2}px)`;
    scanBox.style.top = `calc(50% + ${boxY.value}% - ${boxH.value/2}px)`;
};
[boxW, boxH, boxX, boxY].forEach(el => el.oninput = updateBox);
updateBox();

// Repeat slider
document.getElementById('repSlider').oninput = (e) => {
    document.getElementById('repLabel').innerText = e.target.value + 'm';
};

// Voice
function loadVoices() {
    document.getElementById('voiceSelect').innerHTML =
        synth.getVoices().map(v => `<option value="${v.name}">${v.name}</option>`).join('');
}
synth.onvoiceschanged = loadVoices;
loadVoices();

// Start system
startBtn.onclick = async () => {
    const s = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment" },
        audio: false
    });

    video.srcObject = s;
    startBtn.style.display = 'none';
    statusLight.innerText = "Scanner Active";

    startScanning();
    setInterval(tick, 1000);
};

// 🔥 FIXED SCANNING ENGINE
async function startScanning() {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');

    // ⛔ Slower interval (FIX #1)
    setInterval(async () => {
        if (!video.videoWidth) return;

        const scaleX = video.videoWidth / video.clientWidth;
        const scaleY = video.videoHeight / video.clientHeight;

        const w = boxW.value * scaleX;
        const h = boxH.value * scaleY;

        const x = (video.videoWidth / 2) + (boxX.value / 100 * video.videoWidth) - (w / 2);
        const y = (video.videoHeight / 2) + (boxY.value / 100 * video.videoHeight) - (h / 2);

        canvas.width = w;
        canvas.height = h;

        // 🎯 Image preprocessing (SMART FIX #2)
        ctx.filter = "grayscale(1) contrast(2)";
        ctx.drawImage(video, x, y, w, h, 0, 0, w, h);

        // 🎯 Visual highlight (SMART FIX #1)
        ctx.strokeStyle = "lime";
        ctx.lineWidth = 3;
        ctx.strokeRect(0, 0, w, h);

        statusLight.style.color = "#00e5ff";

        const { data: { text } } = await Tesseract.recognize(canvas, 'eng');

        statusLight.style.color = "#444";

        // 🔍 Improved filtering (FIX #2)
        const found = (text.match(/\d{4}/g) || [])
            .map(n => n.substring(2))
            .map(n => parseInt(n))
            .filter(n => n >= 1 && n <= 60)
            .map(n => n.toString().padStart(2, '0'))
            .filter((v, i, a) => a.indexOf(v) === i)
            .sort();

        // 🧠 Stability logic (FIX #3)
        if (found.length > 0) {
            lastDetectedTime = Date.now();
            activeRooms = found;
            updateDisplay();

            if (activeRooms.join(",") !== lastSet) {
                lastSet = activeRooms.join(",");
                announce();
                timeLeft = document.getElementById('repSlider').value * 60;
            }

        } else {
            // wait 3 seconds before clearing
            if (Date.now() - lastDetectedTime > 3000) {
                activeRooms = [];
                roomDisplay.innerText = "";
                timerDisplay.innerText = "";
                lastSet = "";
                timeLeft = 0;
            }
        }

    }, 2500); // ⛔ slower scan = stable + faster overall
}

// Display logic
function updateDisplay() {
    const count = activeRooms.length;

    if (count === 1) roomDisplay.style.fontSize = "12rem";
    else if (count === 2) roomDisplay.style.fontSize = "8rem";
    else roomDisplay.style.fontSize = "5rem";

    roomDisplay.innerText = activeRooms.join("  ");
}

// 🔊 Audio with cooldown (FIX #4)
function announce() {
    if (activeRooms.length === 0) return;

    if (Date.now() - lastSpoken < 5000) return;

    lastSpoken = Date.now();

    synth.cancel();

    let msg = activeRooms.length === 1
        ? "Room " + activeRooms[0]
        : "Rooms " + activeRooms.slice(0, -1).join(", ") + " and " + activeRooms.slice(-1);

    const ut = new SpeechSynthesisUtterance(msg);

    const selectedVoice = synth.getVoices().find(v =>
        v.name === document.getElementById('voiceSelect').value
    );

    if (selectedVoice) ut.voice = selectedVoice;

    ut.volume = document.getElementById('vol').value;

    synth.speak(ut);
}

// Timer loop
function tick() {
    if (activeRooms.length > 0) {
        if (timeLeft <= 0) {
            announce();
            timeLeft = document.getElementById('repSlider').value * 60;
        } else {
            timeLeft--;
            timerDisplay.innerText =
                `REPEATING IN: ${Math.floor(timeLeft/60)}m ${timeLeft%60}s`;
        }
    }
}

// Test audio
document.getElementById('testBtn').onclick = () => {
    const ut = new SpeechSynthesisUtterance("Audio Working");
    ut.volume = document.getElementById('vol').value;
    synth.speak(ut);
};
</script>
