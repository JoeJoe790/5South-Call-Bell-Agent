<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover">
    <title>Smart Call Bell Pro v7</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root { 
            --bg: #000000; --tile: #1c1c1e; --accent-red: #ff453a; 
            --accent-green: #30d158; --accent-amber: #ff9f0a; 
            --text-main: #ffffff; --text-dim: #8e8e93;
        }
        body { margin: 0; background: var(--bg); color: var(--text-main); font-family: -apple-system, sans-serif; overflow: hidden; height: 100dvh; display: flex; flex-direction: column; }
        #main-wrapper { display: flex; flex-direction: column; width: 100%; height: 100%; position: relative; }
        #cam-area { height: 35dvh; padding: 10px; box-sizing: border-box; z-index: 100; flex-shrink: 0; }
        #cam-card { width: 100%; height: 100%; border-radius: 24px; overflow: hidden; position: relative; background: #111; border: 1px solid #333; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        #scan-box { position: absolute; border: 2px solid var(--accent-green); border-radius: 6px; pointer-events: none; z-index: 20; box-shadow: 0 0 0 1000px rgba(0,0,0,0.4); }
        #interaction-pane { flex-grow: 1; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        #room-area { height: 70%; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 12px; padding: 10px; }
        .room-tile { background: var(--tile); width: 95%; height: 45%; border-radius: 40px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 2px solid #2c2c2e; }
        .room-num { font-weight: 900; line-height: 1; letter-spacing: -5px; color: white; margin: 0; }
        #bottom-controls { height: 30%; display: grid; grid-template-columns: 1fr 1.2fr 1fr; gap: 10px; padding: 10px 15px calc(10px + env(safe-area-inset-bottom)); border-top: 1px solid #222; }
        .control-tile { background: var(--tile); border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: none; font-weight: 800; text-transform: uppercase; font-size: 11px; color: white; }
        #settings-view { position: absolute; inset: 0; background: var(--bg); z-index: 150; display: none; padding: 20px; overflow-y: auto; }
        #settings-view.open { display: block; }
        .s-row { display: flex; align-items: center; margin-bottom: 20px; gap: 15px; }
        .s-row label { flex: 0 0 100px; font-size: 10px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; }
        input[type=range] { flex: 1; height: 10px; -webkit-appearance: none; background: #333; border-radius: 5px; }
        select, .btn-test { background: #333; color: white; border: 1px solid #444; padding: 12px; border-radius: 14px; flex: 1; font-weight: bold; }
        #cfg-toggle { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.6); color: white; border: none; padding: 8px 14px; border-radius: 12px; font-size: 10px; font-weight: bold; z-index: 200; }
        canvas#debug-canvas { position: absolute; bottom: 10px; left: 10px; width: 100px; height: auto; border: 1px solid white; z-index: 1000; pointer-events: none; opacity: 0.7; }
    </style>
</head>
<body>

<div id="main-wrapper">
    <div id="cam-area">
        <div id="cam-card">
            <video id="video" autoplay playsinline></video>
            <div id="scan-box"></div>
            <button id="cfg-toggle" onclick="toggleCfg()">CALIBRATE</button>
            <canvas id="debug-canvas"></canvas>
        </div>
    </div>

    <div id="interaction-pane">
        <div id="room-area">
            <div class="room-tile"><div class="room-num" style="color:#222; font-size: 80px;">--</div></div>
        </div>
        <div id="bottom-controls">
            <div class="control-tile" style="color:var(--accent-amber);"><span style="font-size: 8px; opacity: 0.7;">RE-ALERT</span><div id="timer-clock">00:00</div></div>
            <button id="mainBtn" class="control-tile" style="background:var(--accent-green); color:black;" onclick="handlePower()">START</button>
            <button id="muteBtn" class="control-tile" style="color:var(--accent-amber);" onclick="toggleMute()">MUTE</button>
        </div>

        <div id="settings-view">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
                <h2 style="color:var(--accent-green); margin:0;">Settings</h2>
                <button onclick="toggleCfg()" style="background:none; border:none; color:var(--accent-red); font-weight:900; font-size: 16px;">DONE</button>
            </div>
            <div class="s-row"><label>Width</label><input type="range" id="boxW" min="50" max="800" value="380"></div>
            <div class="s-row"><label>Height</label><input type="range" id="boxH" min="20" max="400" value="90"></div>
            <div class="s-row"><label>B&W Cutoff</label><input type="range" id="thresh" min="50" max="240" value="160"></div>
            <div class="s-row"><label>Confidence</label><input type="range" id="conf" min="50" max="95" value="80"></div>
            <div class="s-row"><label>Repeat</label><input type="range" id="repeat" min="1" max="15" value="3"></div>
            <div class="s-row"><label>Voice</label><select id="voiceSel"></select></div>
            <button class="btn-test" onclick="testAudio()">TEST VOICE</button>
        </div>
    </div>
</div>

<script>
    const video = document.getElementById('video'), roomArea = document.getElementById('room-area');
    const timerClock = document.getElementById('timer-clock'), scanBox = document.getElementById('scan-box');
    const mainBtn = document.getElementById('mainBtn'), muteBtn = document.getElementById('muteBtn'), voiceSel = document.getElementById('voiceSel');
    const settingsView = document.getElementById('settings-view'), debugCanvas = document.getElementById('debug-canvas');
    
    let synth = window.speechSynthesis, activeRooms = [], lastSetString = "", countdown = 0, isRunning = false, isMuted = false, engine, stream, voices = [];

    function toggleCfg() { settingsView.classList.toggle('open'); }
    
    function loadVoices() {
        voices = synth.getVoices().filter(v => v.lang.includes('en'));
        voiceSel.innerHTML = voices.map((v, i) => `<option value="${i}">${v.name}</option>`).join('');
    }
    if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = loadVoices;
    loadVoices();

    function updateUI() {
        const w = document.getElementById('boxW').value, h = document.getElementById('boxH').value;
        scanBox.style.width = w + 'px'; scanBox.style.height = h + 'px';
        scanBox.style.left = `calc(50% - ${w/2}px)`; 
        scanBox.style.top = `calc(50% - ${h/2}px)`;
    }
    document.querySelectorAll('input').forEach(i => i.oninput = updateUI);
    updateUI();

    async function handlePower() {
        if (!isRunning) {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: 1280, height: 720 } });
                video.srcObject = stream; isRunning = true;
                mainBtn.innerText = "STOP"; mainBtn.style.background = "var(--accent-red)";
                startEngine(); 
                setInterval(tick, 1000);
            } catch (e) { alert("Camera Error"); }
        } else {
            location.reload(); // Hard reset for clean stop
        }
    }

    function toggleMute() { isMuted = !isMuted; muteBtn.innerText = isMuted ? "UNMUTE" : "MUTE"; }

    function preProcess(ctx, w, h) {
        const imageData = ctx.getImageData(0, 0, w, h);
        const data = imageData.data;
        const threshold = document.getElementById('thresh').value;
        for (let i = 0; i < data.length; i += 4) {
            const avg = (data[i] + data[i + 1] + data[i + 2]) / 3;
            const val = avg > threshold ? 255 : 0;
            data[i] = data[i+1] = data[i+2] = val;
        }
        ctx.putImageData(imageData, 0, 0);
    }

    function startEngine() {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d', {willReadFrequently: true});
        const worker = Tesseract.createWorker();

        engine = setInterval(async () => {
            if (!isRunning || !video.videoWidth) return;

            const scaleX = video.videoWidth / video.offsetWidth;
            const scaleY = video.videoHeight / video.offsetHeight;
            const w = document.getElementById('boxW').value * scaleX;
            const h = document.getElementById('boxH').value * scaleY;
            const x = (video.videoWidth / 2) - (w / 2);
            const y = (video.videoHeight / 2) - (h / 2);

            canvas.width = w; canvas.height = h;
            ctx.drawImage(video, x, y, w, h, 0, 0, w, h);
            preProcess(ctx, w, h);
            
            // Show debug view
            debugCanvas.width = w; debugCanvas.height = h;
            debugCanvas.getContext('2d').drawImage(canvas, 0,0);

            const { data } = await Tesseract.recognize(canvas, 'eng', {
                tessedit_char_whitelist: '0123456789',
            });

            // Filtering Logic
            const minConf = document.getElementById('conf').value;
            const filteredWords = data.words
                .filter(w => w.confidence > minConf)
                .map(w => w.text.replace(/[^0-9]/g, ''))
                .filter(txt => txt.length >= 2 && txt !== "00");

            const found = [...new Set(filteredWords)].sort();

            if (found.length > 0) {
                const newStr = found.join(",");
                if (newStr !== lastSetString) {
                    activeRooms = found;
                    lastSetString = newStr;
                    render();
                    announce();
                    countdown = document.getElementById('repeat').value * 60;
                }
            } else {
                if (lastSetString !== "") {
                    activeRooms = [];
                    lastSetString = "";
                    render();
                }
            }
        }, 1500);
    }

    function render() {
        if (activeRooms.length === 0) {
            roomArea.innerHTML = `<div class="room-tile"><div class="room-num" style="color:#222; font-size: 80px;">--</div></div>`;
            return;
        }
        roomArea.innerHTML = activeRooms.map(r => `<div class="room-tile"><div class="room-num" style="font-size: 35dvh">${r}</div></div>`).join('');
    }

    function announce() {
        if (activeRooms.length === 0 || isMuted) return;
        synth.cancel();
        const msg = new SpeechSynthesisUtterance("Room " + activeRooms.join(" and "));
        if(voices.length > 0) msg.voice = voices[voiceSel.value];
        synth.speak(msg);
    }

    function testAudio() { 
        const msg = new SpeechSynthesisUtterance("System Ready");
        if(voices.length > 0) msg.voice = voices[voiceSel.value];
        synth.speak(msg); 
    }

    function tick() {
        if (activeRooms.length > 0 && isRunning) {
            if (countdown <= 0) { announce(); countdown = document.getElementById('repeat').value * 60; }
            else { 
                countdown--; 
                timerClock.innerText = Math.floor(countdown/60).toString().padStart(2,'0') + ":" + (countdown%60).toString().padStart(2,'0'); 
            }
        } else { timerClock.innerText = "00:00"; }
    }
</script>
</body>
</html>
