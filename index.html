<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
<title>Smart Call Bell - Pro Max</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
:root { 
    --bg:#000; 
    --tile:#1c1c1e; 
    --text-main:#fff;
    --text-dim:#8e8e93;
    --green:#30d158;
    --red:#ff453a;
    --amber:#ff9f0a;
}

body.light {
    --bg:#f2f2f7;
    --tile:#ffffff;
    --text-main:#000;
    --text-dim:#6e6e73;
}

body {
    margin:0;
    background:var(--bg);
    color:var(--text-main);
    font-family:-apple-system, sans-serif;
    height:100vh;
    display:flex;
    flex-direction:column;
    overflow: hidden;
}

/* Split Layout */
#video-section{height:40vh; padding:10px; box-sizing: border-box;}
#dashboard-section{height:60vh; padding:10px; display:flex; flex-direction:column; gap:10px; box-sizing: border-box;}

#video-card{
    height:100%;
    border-radius:20px;
    overflow:hidden;
    position:relative;
    background:#111;
}

#video{width:100%; height:100%; object-fit:cover;}

#scan-box{
    position:absolute;
    border:3px solid var(--red);
    border-radius:10px;
    pointer-events: none;
    box-shadow: 0 0 10px rgba(255, 69, 58, 0.5);
}

/* BIG Numbers Styling */
#room-container{
    flex:1;
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(45%, 1fr));
    gap:10px;
}

.room-tile{
    background:var(--tile);
    border-radius:25px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    flex: 1; /* Stretch to fill space */
}

.room-number{
    font-size: 22vh; /* Extra Big */
    font-weight:900;
    line-height: 1;
}

.room-label{
    color:var(--green);
    font-weight:800;
    font-size: 14px;
    letter-spacing: 1px;
}

/* Control Bar */
#control-bar{display:flex; gap:10px; height:80px;}

.timer-tile{
    flex:1;
    background:var(--tile);
    border-radius:20px;
    display:flex;
    flex-direction: column;
    align-items:center;
    justify-content:center;
}

#timer-val{font-size:24px; font-weight: bold; color:var(--amber); font-family: monospace;}

#startBtn{
    flex:2;
    border:none;
    border-radius:20px;
    font-size:22px;
    font-weight:800;
    color:#000;
    cursor: pointer;
}

/* Settings */
#settings-panel{
    position:absolute;
    inset:15px;
    background:var(--tile);
    border-radius:30px;
    padding:25px;
    display:none;
    z-index:100;
    border: 1px solid #444;
    overflow-y: auto;
}

#settings-panel.open{display:block;}

.setting-group{
    display:flex;
    align-items:center;
    margin-bottom:15px;
    gap:15px;
}

.setting-group label{
    flex:0 0 110px;
    font-size:12px;
    font-weight:700;
    color:var(--text-dim);
    text-transform: uppercase;
}

.setting-group input { flex:1; height:40px; }

/* Switch & Buttons */
#menu-btn { position:absolute; top:15px; right:15px; background:#0008; border:1px solid #555; color:#fff; padding:10px; border-radius:15px; z-index: 10; cursor:pointer; }
.close-btn { width: 100%; background: var(--red); color: #fff; border: none; padding: 12px; border-radius: 12px; font-weight: bold; margin-bottom: 20px; }
</style>
</head>

<body>

<div id="video-section">
    <div id="video-card">
        <video id="video" autoplay playsinline></video>
        <div id="scan-box"></div>
        <button id="menu-btn" onclick="toggleSettings()">⚙️</button>
    </div>

    <div id="settings-panel">
        <button class="close-btn" onclick="toggleSettings()">SAVE & CLOSE</button>

        <div class="setting-group"><label>Width</label><input type="range" id="boxW" min="50" max="800" value="350"></div>
        <div class="setting-group"><label>Height</label><input type="range" id="boxH" min="20" max="400" value="70"></div>
        <div class="setting-group"><label>X-Pos</label><input type="range" id="boxX" min="-50" max="50" value="0"></div>
        <div class="setting-group"><label>Y-Pos</label><input type="range" id="boxY" min="-50" max="50" value="0"></div>
        <div class="setting-group"><label>Contrast</label><input type="range" id="thresh" min="50" max="220" value="130"></div>

        <div class="setting-group">
            <label>Repeat: <span id="repValDisplay">2 mins</span></label>
            <input type="range" id="repSlider" min="1" max="15" value="2">
        </div>

        <div class="setting-group">
            <label>Dark Mode</label>
            <input type="checkbox" id="darkToggle" checked style="width: 30px; height: 30px;">
        </div>
    </div>
</div>

<div id="dashboard-section">
    <div id="room-container">
        <div class="room-tile"><div class="room-number" style="color:#222;">--</div></div>
    </div>

    <div id="control-bar">
        <div class="timer-tile">
            <span style="font-size: 9px; color: var(--amber); font-weight: bold;">NEXT ALERT</span>
            <div id="timer-val">--:--</div>
        </div>
        <button id="startBtn" style="background:var(--green);">START SYSTEM</button>
    </div>
</div>

<script>
// Get Elements Properly
const video = document.getElementById('video');
const scanBox = document.getElementById('scan-box');
const startBtn = document.getElementById('startBtn');
const roomContainer = document.getElementById('room-container');
const timerVal = document.getElementById('timer-val');
const repSlider = document.getElementById('repSlider');
const repValDisplay = document.getElementById('repValDisplay');
const darkToggle = document.getElementById('darkToggle');

// Variables
let isRunning=false, isProcessing=false;
let activeRooms=[], lastSet="", timeLeft=0, lastSeen=0;
let synth = window.speechSynthesis;

function toggleSettings(){ document.getElementById('settings-panel').classList.toggle('open'); }

darkToggle.addEventListener("change",()=>{ document.body.classList.toggle("light",!darkToggle.checked); });

function updateBox(){
    repValDisplay.innerText = repSlider.value + (repSlider.value == 1 ? " min" : " mins");
    const w = document.getElementById('boxW').value, h = document.getElementById('boxH').value;
    const x = document.getElementById('boxX').value, y = document.getElementById('boxY').value;
    scanBox.style.width = w + 'px';
    scanBox.style.height = h + 'px';
    scanBox.style.left = `calc(50% + ${x}% - ${w/2}px)`;
    scanBox.style.top = `calc(50% + ${y}% - ${h/2}px)`;
}

document.querySelectorAll('input').forEach(i=>i.oninput=updateBox);
updateBox();

startBtn.onclick = async () => {
    if(isRunning){ location.reload(); return; }
    // Nudge audio for iOS
    synth.speak(new SpeechSynthesisUtterance(""));
    try {
        const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment", width: 1920, height: 1080}});
        video.srcObject = stream;
        isRunning = true;
        startBtn.innerText = "STOP";
        startBtn.style.background = "var(--red)";
        startScanning();
        setInterval(tick, 1000);
    } catch(e) { alert("Please allow camera access."); }
};

function startScanning(){
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');

    setInterval(async () => {
        if(!video.videoWidth || isProcessing || !isRunning) return;
        isProcessing = true;

        const rect = video.getBoundingClientRect();
        const sX = video.videoWidth / rect.width;
        const sY = video.videoHeight / rect.height;

        const w = document.getElementById('boxW').value * sX;
        const h = document.getElementById('boxH').value * sY;
        const x = (video.videoWidth/2) + ((document.getElementById('boxX').value/100)*video.videoWidth) - (w/2);
        const y = (video.videoHeight/2) + ((document.getElementById('boxY').value/100)*video.videoHeight) - (h/2);

        canvas.width = w; canvas.height = h;
        ctx.drawImage(video, x, y, w, h, 0, 0, w, h);

        let img = ctx.getImageData(0,0,w,h);
        let d = img.data;
        let thresholdVal = document.getElementById('thresh').value;

        for(let i=0; i<d.length; i+=4){
            let avg = (d[i]+d[i+1]+d[i+2])/3;
            d[i] = d[i+1] = d[i+2] = avg > thresholdVal ? 255 : 0;
        }
        ctx.putImageData(img, 0, 0);

        try {
            const {data:{text}} = await Tesseract.recognize(canvas, 'eng');
            const nums = (text.replace(/\D/g," ").match(/\d{4,5}/g)||[]).map(n=>n.slice(-2));

            if(nums.length){
                activeRooms = [...new Set(nums)].sort();
                lastSeen = Date.now();
                updateUI();

                if(activeRooms.join() !== lastSet){
                    lastSet = activeRooms.join();
                    announce(); // Speak the rooms!
                    timeLeft = repSlider.value * 60;
                }
            } else {
                if(Date.now() - lastSeen > 4000){ // Clear after 4 seconds of nothing
                    activeRooms = [];
                    lastSet = "";
                    roomContainer.innerHTML = `<div class="room-tile"><div class="room-number" style="color:#222;">--</div></div>`;
                }
            }
        } catch(e) {}
        isProcessing = false;
    }, 1800);
}

function updateUI(){
    roomContainer.innerHTML = activeRooms.map(r => `
        <div class="room-tile">
            <div class="room-label">ROOM</div>
            <div class="room-number">${r}</div>
        </div>`).join('');
}

function announce() {
    if (activeRooms.length === 0) return;
    synth.cancel();
    let msg = (activeRooms.length > 1 ? "Rooms " : "Room ") + activeRooms.join(" and ");
    let ut = new SpeechSynthesisUtterance(msg);
    ut.rate = 0.9;
    synth.speak(ut);
}

function tick(){
    if(!isRunning) return;
    if(activeRooms.length){
        if(timeLeft <= 0){
            announce();
            timeLeft = repSlider.value * 60;
        } else {
            timeLeft--;
            timerVal.innerText = Math.floor(timeLeft/60).toString().padStart(2,'0')+":"+(timeLeft%60).toString().padStart(2,'0');
        }
    } else {
        timerVal.innerText = "WAITING";
    }
}
</script>

</body>
</html>
