<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>Nurse Monitor Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root { --accent: #28cd41; --danger: #ff3b30; --warning: #ffcc00; }
        body { margin: 0; background: #000; color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        /* LANDSCAPE: Split View (Camera Left, Numbers Right) */
        @media (orientation: landscape) {
            body { flex-direction: row; }
            #video-container { flex: 1.2; height: 100vh; border-right: 2px solid #333; }
            #dashboard { flex: 0.8; height: 100vh; border-top: none !important; padding: 10px; justify-content: flex-start; }
            #room-display { 
                display: flex; 
                flex-direction: column; 
                gap: 10px; 
                font-size: 6vw !important; /* Large stackable numbers */
                padding-top: 20px;
            }
        }

        /* PORTRAIT: Classic View (Camera Top, Numbers Bottom) */
        @media (orientation: portrait) {
            #video-container { flex: 1; width: 100vw; }
            #dashboard { flex: 1; border-top: 2px solid #333; padding: 20px; }
            #room-display { font-size: 10rem; }
        }

        #video-container { position: relative; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        #scan-box { position: absolute; border: 3px solid var(--danger); border-radius: 8px; pointer-events: none; box-shadow: 0 0 15px rgba(255,59,48,0.4); z-index: 5; }

        #dashboard { background: #000; display: flex; flex-direction: column; align-items: center; position: relative; }
        #room-display { font-weight: 900; color: var(--accent); text-align: center; width: 100%; line-height: 1; }
        #timer-display { font-size: 1rem; color: var(--warning); margin-top: auto; padding-bottom: 30px; font-weight: bold; font-family: monospace; }
        #status-light { font-size: 0.6rem; color: #444; position: absolute; bottom: 5px; right: 10px; }

        #settings-menu { position: fixed; right: -320px; top: 0; width: 280px; height: 100%; background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); z-index: 100; transition: 0.3s; padding: 20px; border-left: 1px solid #444; overflow-y: auto; }
        #settings-menu.open { right: 0; }
        .setting-row { margin-bottom: 20px; display: flex; flex-direction: column; }
        .slider-group { display: flex; align-items: center; gap: 10px; margin-top: 5px; }
        .label-text { font-size: 0.7rem; color: #00e5ff; font-weight: bold; width: 80px; }
        input[type=range] { flex: 1; }

        #menu-toggle { position: absolute; top: 10px; right: 10px; background: rgba(51,51,51,0.6); color: #fff; border: 1px solid #777; padding: 10px; border-radius: 8px; z-index: 101; cursor: pointer; }
        #startBtn { background: var(--accent); color: white; border: none; padding: 20px 40px; border-radius: 12px; font-size: 1.5rem; font-weight: bold; cursor: pointer; }
        .close-btn { background: #007aff; width: 100%; padding: 12px; border: none; color: white; border-radius: 8px; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="video-container">
        <video id="video" autoplay playsinline></video>
        <div id="scan-box"></div>
        <div id="menu-toggle">⚙️</div>
    </div>

    <div id="dashboard">
        <button id="startBtn">START SYSTEM</button>
        <div id="room-display"></div>
        <div id="timer-display"></div>
        <div id="status-light">Idle</div>
    </div>

    <div id="settings-menu">
        <h3 style="margin-top:0; color:var(--accent);">Calibration</h3>
        <div class="setting-row">
            <div class="slider-group"><span class="label-text">Width</span><input type="range" id="boxW" min="50" max="600" value="250"></div>
            <div class="slider-group"><span class="label-text">Height</span><input type="range" id="boxH" min="30" max="400" value="120"></div>
        </div>
        <div class="setting-row">
            <div class="slider-group"><span class="label-text">X-Pos</span><input type="range" id="boxX" min="-50" max="50" value="0"></div>
            <div class="slider-group"><span class="label-text">Y-Pos</span><input type="range" id="boxY" min="-50" max="50" value="0"></div>
        </div>
        <div class="setting-row">
            <label style="font-size: 0.7rem; color: var(--warning);">REPEAT: <span id="repLabel">2m</span></label>
            <input type="range" id="repSlider" min="1" max="15" value="2">
        </div>
        <div class="setting-row">
            <label style="font-size: 0.7rem;">VOICE & VOLUME</label>
            <select id="voiceSelect" style="background:#222; color:white; border:1px solid #777; padding:5px; width:100%;"></select>
            <div class="slider-group"><span class="label-text">Vol</span><input type="range" id="vol" min="0" max="1" step="0.1" value="1"></div>
        </div>
        <button id="testBtn" style="width:100%; background:transparent; color:white; padding:10px; border:1px solid #555; border-radius:8px;">Test Audio</button>
        <button class="close-btn" onclick="toggleMenu()">CLOSE</button>
    </div>

    <script>
        const video = document.getElementById('video');
        const startBtn = document.getElementById('startBtn');
        const roomDisplay = document.getElementById('room-display');
        const timerDisplay = document.getElementById('timer-display');
        const statusLight = document.getElementById('status-light');
        const menu = document.getElementById('settings-menu');
        const boxW = document.getElementById('boxW'), boxH = document.getElementById('boxH');
        const boxX = document.getElementById('boxX'), boxY = document.getElementById('boxY');
        const scanBox = document.getElementById('scan-box');
        
        let synth = window.speechSynthesis;
        let activeRooms = []; let lastSet = ""; let timeLeft = 0;

        function toggleMenu() { menu.classList.toggle('open'); }
        document.getElementById('menu-toggle').onclick = toggleMenu;

        const updateBox = () => {
            scanBox.style.width = boxW.value + 'px';
            scanBox.style.height = boxH.value + 'px';
            scanBox.style.left = `calc(50% + ${boxX.value}% - ${boxW.value/2}px)`;
            scanBox.style.top = `calc(50% + ${boxY.value}% - ${boxH.value/2}px)`;
        };
        [boxW, boxH, boxX, boxY].forEach(el => el.oninput = updateBox);
        updateBox();

        document.getElementById('repSlider').oninput = (e) => { 
            document.getElementById('repLabel').innerText = e.target.value + 'm'; 
        };

        function loadVoices() {
            document.getElementById('voiceSelect').innerHTML = synth.getVoices()
                .map(v => `<option value="${v.name}">${v.name}</option>`).join('');
        }
        synth.onvoiceschanged = loadVoices; loadVoices();

        startBtn.onclick = async () => {
            const s = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }, 
                audio: false 
            });
            video.srcObject = s;
            startBtn.style.display = 'none';
            statusLight.innerText = "Active";
            startScanning();
            setInterval(tick, 1000);
        };

        async function startScanning() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            setInterval(async () => {
                if (!video.videoWidth || video.readyState < 2) return;
                
                const scaleX = video.videoWidth / video.offsetWidth;
                const scaleY = video.videoHeight / video.offsetHeight;
                const w = boxW.value * scaleX;
                const h = boxH.value * scaleY;
                const x = (video.videoWidth / 2) + ((boxX.value / 100) * video.videoWidth) - (w / 2);
                const y = (video.videoHeight / 2) + ((boxY.value / 100) * video.videoHeight) - (h / 2);

                canvas.width = w; canvas.height = h;
                ctx.drawImage(video, x, y, w, h, 0, 0, w, h);
                
                statusLight.style.color = "#00e5ff";
                const { data: { text } } = await Tesseract.recognize(canvas, 'eng');
                statusLight.style.color = "#444";

                const found = (text.match(/\d{4}/g) || [])
                    .map(n => n.substring(2))
                    .filter((v, i, a) => a.indexOf(v) === i && parseInt(v) <= 60)
                    .sort();
                
                if (found.length > 0) {
                    activeRooms = found;
                    updateDisplay();
                    if (activeRooms.join(",") !== lastSet) { 
                        lastSet = activeRooms.join(",");
                        announce(); 
                        timeLeft = document.getElementById('repSlider').value * 60; 
                    }
                } else {
                    roomDisplay.innerHTML = ""; 
                    timerDisplay.innerText = ""; 
                    lastSet = "";
                    activeRooms = [];
                }
            }, 1200);
        }

        function updateDisplay() {
            if (window.innerHeight < window.innerWidth) {
                // Landscape: Stacked Divs
                roomDisplay.innerHTML = activeRooms.map(r => `<div>${r}</div>`).join('');
            } else {
                // Portrait: Horizontal Space
                roomDisplay.innerHTML = activeRooms.join(" ");
            }
        }

        function announce() {
            if (activeRooms.length === 0) return;
            synth.cancel();
            let msg = activeRooms.length === 1 ? "Room " + activeRooms[0] : "Rooms " + activeRooms.slice(0,-1).join(", ") + " and " + activeRooms.slice(-1);
            const ut = new SpeechSynthesisUtterance(msg);
            const selectedVoice = synth.getVoices().find(v => v.name === document.getElementById('voiceSelect').value);
            if(selectedVoice) ut.voice = selectedVoice;
            ut.volume = document.getElementById('vol').value;
            synth.speak(ut);
        }

        function tick() {
            if (activeRooms.length > 0) {
                if (timeLeft <= 0) {
                    announce();
                    timeLeft = document.getElementById('repSlider').value * 60;
                } else {
                    timeLeft--;
                    timerDisplay.innerText = `REPEATING IN: ${Math.floor(timeLeft/60)}m ${timeLeft%60}s`;
                }
            }
        }

        document.getElementById('testBtn').onclick = () => {
            const ut = new SpeechSynthesisUtterance("Audio Working");
            ut.volume = document.getElementById('vol').value;
            synth.speak(ut);
        };
        window.addEventListener("resize", updateDisplay);
    </script>
</body>
</html>
