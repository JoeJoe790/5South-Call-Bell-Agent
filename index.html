<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>Smart Call Bell - iOS Pro Max</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root { 
            --bg: #000000; 
            --tile: #1c1c1e; 
            --accent-red: #ff453a; 
            --accent-green: #30d158; 
            --accent-amber: #ff9f0a; 
            --text-main: #ffffff;
            --text-dim: #8e8e93;
        }
        
        body { margin: 0; background: var(--bg); color: var(--text-main); font-family: -apple-system, system-ui, sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        @media (orientation: landscape) {
            body { flex-direction: row; }
            #video-container { flex: 1.2; height: 100vh; padding: 10px; }
            #dashboard { flex: 0.8; height: 100vh; padding: 10px; }
        }

        @media (orientation: portrait) {
            #video-container { flex: 0.8; width: 100vw; padding: 10px; }
            #dashboard { flex: 1.2; padding: 10px; }
        }

        #video-card { width: 100%; height: 100%; border-radius: 24px; overflow: hidden; position: relative; background: #111; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        #scan-box { position: absolute; border: 3px solid var(--accent-red); border-radius: 8px; pointer-events: none; z-index: 5; box-shadow: 0 0 20px rgba(255,69,58,0.5); }

        #dashboard { display: flex; flex-direction: column; gap: 12px; }
        
        /* THE BIG ROOM DISPLAY */
        #room-list-container { 
            flex-grow: 1; 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); 
            gap: 12px; 
            width: 100%;
        }

        .room-tile { 
            background: var(--tile); 
            border-radius: 24px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .room-label { font-size: 14px; font-weight: 800; color: var(--accent-green); letter-spacing: 2px; margin-bottom: -10px; }
        /* Dynamic Font Size for visibility */
        .room-number { font-size: clamp(80px, 20vw, 180px); font-weight: 900; line-height: 1; letter-spacing: -4px; }

        /* BOTTOM CONTROLS */
        #interaction-bar { display: flex; gap: 12px; min-height: 100px; }
        .control-tile { background: var(--tile); border-radius: 24px; padding: 15px; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        #timer-display { font-family: monospace; font-size: 32px; font-weight: bold; color: var(--accent-amber); }
        #startBtn { flex: 1.5; border: none; border-radius: 24px; font-size: 20px; font-weight: 800; cursor: pointer; color: #000; transition: 0.2s; }

        /* SETTINGS: Labels on the Left */
        #settings-panel { 
            position: absolute; top: 15px; left: 15px; right: 15px; 
            background: rgba(28, 28, 30, 0.95); backdrop-filter: blur(20px); 
            border-radius: 24px; padding: 20px; z-index: 100; display: none; 
            border: 1px solid rgba(255,255,255,0.1); 
        }
        #settings-panel.open { display: block; }
        
        .setting-row { display: flex; align-items: center; margin-bottom: 15px; gap: 15px; }
        .setting-row label { flex: 0 0 100px; font-size: 11px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; }
        .setting-row input { flex: 1; }

        #menu-btn { position: absolute; top: 25px; right: 25px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 10px 18px; border-radius: 15px; z-index: 101; font-weight: bold; cursor: pointer; }

        input[type=range] { -webkit-appearance: none; background: #3a3a3c; height: 6px; border-radius: 3px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 24px; height: 24px; background: #fff; border-radius: 50%; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

    <div id="video-container">
        <div id="video-card">
            <video id="video" autoplay playsinline></video>
            <div id="scan-box"></div>
            <button id="menu-btn" onclick="toggleSettings()">SETTINGS</button>
            
            <div id="settings-panel">
                <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                    <span style="font-weight: bold; color: var(--accent-green);">CALIBRATION</span>
                    <button onclick="toggleSettings()" style="background:none; border:none; color:var(--accent-red); font-weight:bold; cursor:pointer;">DONE</button>
                </div>
                
                <div class="setting-row"> <label>Width</label> <input type="range" id="boxW" min="50" max="800" value="320"> </div>
                <div class="setting-row"> <label>Height</label> <input type="range" id="boxH" min="20" max="400" value="70"> </div>
                <div class="setting-row"> <label>X-Pos</label> <input type="range" id="boxX" min="-50" max="50" value="0"> </div>
                <div class="setting-row"> <label>Y-Pos</label> <input type="range" id="boxY" min="-50" max="50" value="0"> </div>
                <div class="setting-row"> <label>Contrast</label> <input type="range" id="threshold" min="50" max="220" value="130"> </div>
                <div class="setting-row"> <label>Repeat</label> <input type="range" id="repSlider" min="1" max="15" value="2"> </div>
                
                <select id="voiceSelect" style="width:100%; background:#2c2c2e; color:white; border:none; padding:12px; border-radius:12px; margin-top:10px;"></select>
                <button id="testBtn" style="width:100%; background:rgba(255,255,255,0.1); color:white; border:none; padding:12px; border-radius:12px; font-weight:bold; margin-top:10px; cursor:pointer;">TEST AUDIO</button>
            </div>
        </div>
    </div>

    <div id="dashboard">
        <div id="room-list-container">
            <div class="room-tile"><div class="room-number" style="color:#333;">--</div></div>
        </div>

        <div id="interaction-bar">
            <div class="control-tile">
                <div style="font-size: 10px; font-weight: 800; color: var(--accent-amber); margin-bottom: 4px;">REPEAT IN</div>
                <div id="timer-display">--:--</div>
            </div>
            <button id="startBtn" style="background: var(--accent-green);">START SYSTEM</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const startBtn = document.getElementById('startBtn');
        const roomDisplay = document.getElementById('room-list-container');
        const timerDisplay = document.getElementById('timer-display');
        const scanBox = document.getElementById('scan-box');
        
        let synth = window.speechSynthesis;
        let activeRooms = []; let lastSet = ""; let timeLeft = 0;
        let isRunning = false; let scanInterval, tickInterval;

        function toggleSettings() { document.getElementById('settings-panel').classList.toggle('open'); }

        const updateBox = () => {
            const w = document.getElementById('boxW').value, h = document.getElementById('boxH').value;
            const x = document.getElementById('boxX').value, y = document.getElementById('boxY').value;
            scanBox.style.width = w + 'px';
            scanBox.style.height = h + 'px';
            scanBox.style.left = `calc(50% + ${x}% - ${w/2}px)`;
            scanBox.style.top = `calc(50% + ${y}% - ${h/2}px)`;
        };
        document.querySelectorAll('input').forEach(i => i.oninput = updateBox);
        updateBox();

        function loadVoices() {
            const voices = synth.getVoices();
            document.getElementById('voiceSelect').innerHTML = voices.map(v => `<option value="${v.name}">${v.name}</option>`).join('');
        }
        speechSynthesis.onvoiceschanged = loadVoices; loadVoices();

        startBtn.onclick = async () => {
            if (isRunning) { location.reload(); return; }
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: 1920, height: 1080 } });
                video.srcObject = s;
                isRunning = true;
                startBtn.innerText = "STOP SYSTEM";
                startBtn.style.background = "var(--accent-red)";
                startScanning();
                tickInterval = setInterval(tick, 1000);
            } catch (e) { alert("Camera access required."); }
        };

        async function startScanning() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            scanInterval = setInterval(async () => {
                if (!isRunning || !video.videoWidth) return;
                
                const scaleX = video.videoWidth / video.offsetWidth;
                const scaleY = video.videoHeight / video.offsetHeight;
                const w = document.getElementById('boxW').value * scaleX;
                const h = document.getElementById('boxH').value * scaleY;
                const x = (video.videoWidth/2) + ((document.getElementById('boxX').value/100)*video.videoWidth) - (w/2);
                const y = (video.videoHeight/2) + ((document.getElementById('boxY').value/100)*video.videoHeight) - (h/2);

                canvas.width = w; canvas.height = h;
                ctx.drawImage(video, x, y, w, h, 0, 0, w, h);

                // Contrast Filter
                let imgData = ctx.getImageData(0,0,w,h);
                let d = imgData.data; let th = document.getElementById('threshold').value;
                for (let i=0; i<d.length; i+=4) {
                    let avg = (d[i]+d[i+1]+d[i+2])/3;
                    d[i] = d[i+1] = d[i+2] = avg > th ? 255 : 0;
                }
                ctx.putImageData(imgData, 0, 0);

                const { data: { text } } = await Tesseract.recognize(canvas, 'eng');
                const matches = text.match(/\d{4,5}/g) || [];
                const filtered = matches.map(n => n.substring(2,4)).filter((v,i,a) => a.indexOf(v)===i && parseInt(v)>0).sort();

                if (filtered.length > 0) {
                    activeRooms = filtered;
                    updateUI();
                    if (activeRooms.join(",") !== lastSet) {
                        lastSet = activeRooms.join(",");
                        announce();
                        timeLeft = document.getElementById('repSlider').value * 60;
                    }
                } else {
                    activeRooms = [];
                    roomDisplay.innerHTML = `<div class="room-tile"><div class="room-number" style="color:#222;">--</div></div>`;
                }
            }, 2000);
        }

        function updateUI() {
            roomDisplay.innerHTML = activeRooms.map(r => `
                <div class="room-tile">
                    <div class="room-label">CALL</div>
                    <div class="room-number">${r}</div>
                </div>
            `).join('');
        }

        function announce() {
            if (activeRooms.length === 0) return;
            synth.cancel();
            let msg = new SpeechSynthesisUtterance((activeRooms.length > 1 ? "Rooms " : "Room ") + activeRooms.join(" and "));
            const voice = synth.getVoices().find(v => v.name === document.getElementById('voiceSelect').value);
            if(voice) msg.voice = voice;
            msg.rate = 0.85;
            synth.speak(msg);
        }

        function tick() {
            if (activeRooms.length > 0) {
                if (timeLeft <= 0) { announce(); timeLeft = document.getElementById('repSlider').value * 60; }
                else { 
                    timeLeft--; 
                    timerDisplay.innerText = Math.floor(timeLeft/60).toString().padStart(2,'0') + ":" + (timeLeft%60).toString().padStart(2,'0');
                }
            } else { timerDisplay.innerText = "WAITING"; }
        }

        document.getElementById('testBtn').onclick = () => {
            synth.cancel();
            synth.speak(new SpeechSynthesisUtterance("Audio check. Volume normal."));
        };
    </script>
</body>
</html>
