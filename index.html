<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover">
    <title>Smart Call Bell - Pro Recognition</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root { 
            --bg: #000000; --tile: #1c1c1e; --accent-red: #ff453a; 
            --accent-green: #30d158; --accent-amber: #ff9f0a; 
            --text-main: #ffffff; --text-dim: #8e8e93;
        }
        body { margin: 0; background: var(--bg); color: var(--text-main); font-family: -apple-system, sans-serif; overflow: hidden; height: 100dvh; display: flex; flex-direction: column; }
        #main-wrapper { display: flex; flex-direction: column; width: 100%; height: 100%; position: relative; }
        #cam-area { height: 40dvh; padding: 10px; box-sizing: border-box; z-index: 10; }
        #cam-card { width: 100%; height: 100%; border-radius: 20px; overflow: hidden; position: relative; background: #111; border: 1px solid #333; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        #scan-box { position: absolute; border: 2px solid var(--accent-red); border-radius: 6px; pointer-events: none; z-index: 20; }
        #room-area { height: 50dvh; display: flex; flex-direction: column; justify-content: center; align-items: center; overflow: hidden; gap: 15px; }
        #bottom-controls { height: 10dvh; display: grid; grid-template-columns: 1fr 1.2fr 1fr; gap: 8px; padding: 5px 10px calc(5px + env(safe-area-inset-bottom)); border-top: 1px solid #44444433; }
        
        @media (orientation: landscape) {
            #main-wrapper { flex-direction: row; }
            #cam-area { width: 40vw; height: 100dvh; padding: 15px; }
            #right-pane { width: 60vw; height: 100dvh; display: flex; flex-direction: column; }
            #room-area { height: 85%; gap: 20px; }
            #bottom-controls { height: 15%; }
        }

        .room-num { font-weight: 900; line-height: 0.8; letter-spacing: -5px; text-align: center; color: white; }
        .control-tile { background: var(--tile); border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: none; font-weight: 800; text-transform: uppercase; font-size: 11px; }
        
        /* Floating Settings UI */
        #settings-overlay { position: fixed; inset: 0; display: none; justify-content: center; align-items: center; z-index: 1000; background: rgba(0,0,0,0.4); }
        #settings-overlay.open { display: flex; }
        #settings-card { width: 90%; height: 70dvh; background: rgba(28,28,30,0.95); backdrop-filter: blur(25px); border-radius: 30px; border: 1px solid #444; padding: 25px; overflow-y: auto; box-sizing: border-box; }
        .s-row { display: flex; align-items: center; margin-bottom: 20px; gap: 15px; }
        .s-row label { flex: 0 0 120px; font-size: 10px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; }
        input[type=range] { flex: 1; height: 8px; -webkit-appearance: none; background: #2c2c2e; border-radius: 5px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 24px; height: 24px; border-radius: 50%; background: white; cursor: pointer; }
        select, .btn-test { background: #2c2c2e; color: white; border: 1px solid #444; padding: 12px; border-radius: 12px; flex: 1; }
        .btn-test { background: var(--accent-green); color: black; font-weight: bold; border: none; margin-top: 10px; }
        #cfg-toggle { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.5); color: white; border: 1px solid #444; padding: 6px 12px; border-radius: 10px; font-size: 10px; z-index: 30; }
    </style>
</head>
<body>

<div id="main-wrapper">
    <div id="cam-area">
        <div id="cam-card">
            <video id="video" autoplay playsinline></video>
            <div id="scan-box"></div>
            <button id="cfg-toggle" onclick="toggleCfg()">SETTINGS</button>
        </div>
    </div>
    <div id="right-pane">
        <div id="room-area"><div class="room-num" style="color:#222; font-size: 80px;">--</div></div>
        <div id="bottom-controls">
            <div class="control-tile" style="color:var(--accent-amber);"><span style="font-size: 8px; opacity: 0.7;">REMAINING</span><div id="timer-clock">00:00</div></div>
            <button id="mainBtn" class="control-tile" style="background:var(--accent-green); color:black;" onclick="handlePower()">START</button>
            <button id="muteBtn" class="control-tile" style="color:var(--accent-amber);" onclick="toggleMute()">MUTE</button>
        </div>
    </div>
</div>

<div id="settings-overlay">
    <div id="settings-card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="color:var(--accent-green); margin:0;">Calibration</h2>
            <button onclick="toggleCfg()" style="background:none; border:none; color:var(--accent-red); font-weight:900;">CLOSE</button>
        </div>
        <div class="s-row"><label>Box Width</label><input type="range" id="boxW" min="50" max="1000" value="380"></div>
        <div class="s-row"><label>Box Height</label><input type="range" id="boxH" min="20" max="500" value="90"></div>
        <div class="s-row"><label>Horizontal</label><input type="range" id="boxX" min="-50" max="50" value="0"></div>
        <div class="s-row"><label>Vertical</label><input type="range" id="boxY" min="-50" max="50" value="0"></div>
        <div class="s-row"><label>Contrast</label><input type="range" id="thresh" min="50" max="220" value="140"></div>
        <div class="s-row"><label>Repeat Alert</label><input type="range" id="repeat" min="1" max="15" value="3"><span id="vR" style="color:var(--accent-amber); font-weight:bold;">3m</span></div>
        <div class="s-row"><label>Volume</label><input type="range" id="vol" min="0" max="1" step="0.1" value="0.9"></div>
        <div class="s-row"><label>Choose Voice</label><select id="voiceSel"></select></div>
        <button class="btn-test" onclick="testAudio()">TEST AUDIO</button>
    </div>
</div>

<script>
    const video = document.getElementById('video'), roomArea = document.getElementById('room-area');
    const timerClock = document.getElementById('timer-clock'), scanBox = document.getElementById('scan-box');
    const mainBtn = document.getElementById('mainBtn'), muteBtn = document.getElementById('muteBtn'), voiceSel = document.getElementById('voiceSel');
    let synth = window.speechSynthesis, activeRooms = [], lastSetString = "", countdown = 0, isRunning = false, isMuted = false, engine, stream, voices = [];

    function toggleCfg() { document.getElementById('settings-overlay').classList.toggle('open'); }
    function loadVoices() { voices = synth.getVoices().filter(v => v.lang.includes('en')); voiceSel.innerHTML = voices.map((v, i) => `<option value="${i}">${v.name}</option>`).join(''); }
    if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = loadVoices; loadVoices();

    function updateSettings() {
        const w = document.getElementById('boxW').value, h = document.getElementById('boxH').value;
        const x = document.getElementById('boxX').value, y = document.getElementById('boxY').value;
        scanBox.style.width = w + 'px'; scanBox.style.height = h + 'px';
        scanBox.style.left = `calc(50% + ${x}% - ${w/2}px)`; scanBox.style.top = `calc(50% + ${y}% - ${h/2}px)`;
        document.getElementById('vR').innerText = document.getElementById('repeat').value + 'm';
        render();
    }
    document.querySelectorAll('input').forEach(i => i.oninput = updateSettings); updateSettings();

    async function handlePower() {
        if (!isRunning) {
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: 1920, height: 1080 } });
            video.srcObject = stream; isRunning = true; mainBtn.innerText = "STOP"; mainBtn.style.background = "var(--accent-red)";
            startEngine(); setInterval(tick, 1000);
        } else {
            isRunning = false; clearInterval(engine); if (stream) stream.getTracks().forEach(t => t.stop());
            video.srcObject = null; mainBtn.innerText = "START"; mainBtn.style.background = "var(--accent-green)";
            activeRooms = []; render();
        }
    }

    function toggleMute() { isMuted = !isMuted; muteBtn.innerText = isMuted ? "UNMUTE" : "MUTE"; muteBtn.style.color = isMuted ? "var(--accent-red)" : "var(--accent-amber)"; }

    function startEngine() {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        engine = setInterval(async () => {
            if (!isRunning || !video.videoWidth) return;
            const sx = video.videoWidth/video.offsetWidth, sy = video.videoHeight/video.offsetHeight;
            const w = document.getElementById('boxW').value*sx, h = document.getElementById('boxH').value*sy;
            const x = (video.videoWidth/2)+((document.getElementById('boxX').value/100)*video.videoWidth)-(w/2);
            const y = (video.videoHeight/2)+((document.getElementById('boxY').value/100)*video.videoHeight)-(h/2);
            canvas.width = w; canvas.height = h; ctx.drawImage(video, x, y, w, h, 0, 0, w, h);
            
            const { data: { text } } = await Tesseract.recognize(canvas, 'eng');
            // Improved Regex: finds 4+ digits, takes last 2. Handles multi-line better.
            const found = (text.match(/\d{3,5}/g) || []).map(n => n.slice(-2)).filter((v,i,a) => a.indexOf(v)===i).sort();
            
            if (found.length > 0) {
                const newSetString = found.join(",");
                // If a room is ADDED or CHANGED, trigger immediate alert and reset timer
                if (newSetString !== lastSetString) {
                    activeRooms = found;
                    lastSetString = newSetString;
                    render();
                    announce(); 
                    countdown = document.getElementById('repeat').value * 60; // Reset timer to full duration
                }
            } else {
                activeRooms = [];
                lastSetString = "";
                roomArea.innerHTML = `<div class="room-num" style="color:#222; font-size: 80px;">--</div>`;
            }
        }, 2200); // Slightly faster scan for better response
    }

    function render() {
        const count = activeRooms.length, isL = window.innerWidth > window.innerHeight;
        const fs = isL ? (count === 1 ? '70dvh' : '35dvh') : (count === 1 ? '50dvh' : '25dvh');
        roomArea.innerHTML = activeRooms.map(r => `<div class="room-num" style="font-size: ${fs}">${r}</div>`).join('');
    }

    function announce() {
        if (activeRooms.length === 0 || isMuted) return;
        synth.cancel();
        const msg = new SpeechSynthesisUtterance("Room " + activeRooms.join(", "));
        if(voices.length > 0) msg.voice = voices[voiceSel.value];
        msg.volume = document.getElementById('vol').value;
        synth.speak(msg);
    }

    function testAudio() { 
        const msg = new SpeechSynthesisUtterance("Test alert for active rooms");
        if(voices.length > 0) msg.voice = voices[voiceSel.value];
        msg.volume = document.getElementById('vol').value;
        synth.speak(msg); 
    }

    function tick() {
        if (activeRooms.length > 0 && isRunning) {
            if (countdown <= 0) { 
                announce(); // Re-announce all rooms after 3 mins
                countdown = document.getElementById('repeat').value * 60; 
            } else { 
                countdown--; 
                timerClock.innerText = Math.floor(countdown/60).toString().padStart(2,'0') + ":" + (countdown%60).toString().padStart(2,'0'); 
            }
        } else { timerClock.innerText = "00:00"; }
    }
    window.addEventListener('resize', render);
</script>
</body>
</html>
