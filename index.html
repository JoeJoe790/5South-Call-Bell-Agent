<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>Call Bell Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root { 
            --ios-bg: #000000;
            --ios-tile: #1c1c1e;
            --ios-green: #30d158;
            --ios-red: #ff453a;
            --ios-amber: #ff9f0a;
            --ios-blue: #0a84ff;
        }

        body { 
            margin: 0; background: var(--ios-bg); color: white; 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* Top Section: Camera */
        #top-view { height: 35vh; position: relative; padding: 10px; box-sizing: border-box; }
        #camera-card { 
            width: 100%; height: 100%; background: #111; border-radius: 20px; 
            overflow: hidden; position: relative; border: 1px solid #333;
        }
        #video { width: 100%; height: 100%; object-fit: cover; }
        #scan-zone { 
            position: absolute; border: 2px solid var(--ios-red); border-radius: 8px;
            box-shadow: 0 0 15px rgba(255,69,58,0.3); pointer-events: none;
        }

        /* Bottom Section: Dashboard */
        #bottom-view { 
            height: 65vh; background: #000; border-top: 1px solid #222;
            padding: 15px; display: flex; flex-direction: column; gap: 15px; box-sizing: border-box;
        }

        /* Big Room Display */
        #room-display { 
            flex: 1; background: var(--ios-tile); border-radius: 25px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .room-val { font-size: 22vh; font-weight: 800; line-height: 1; margin: 0; }
        .room-label { color: var(--ios-green); font-weight: bold; letter-spacing: 2px; font-size: 14px; }

        /* Control Grid */
        .control-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; height: 120px; }
        .info-tile { 
            background: var(--ios-tile); border-radius: 20px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .info-label { font-size: 10px; font-weight: bold; color: #8e8e93; text-transform: uppercase; margin-bottom: 5px; }
        #timer-text { font-size: 24px; font-weight: bold; color: var(--ios-amber); font-family: monospace; }

        /* iOS Themed Start Button */
        #action-btn { 
            height: 80px; border: none; border-radius: 20px; 
            font-size: 20px; font-weight: bold; cursor: pointer;
            transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-start { background: var(--ios-green); color: black; }
        .btn-stop { background: var(--ios-red); color: white; }

        /* Settings Overlays */
        #settings-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); 
            z-index: 100; padding: 30px; display: none; overflow-y: auto;
        }
        .setting-row { margin-bottom: 20px; display: flex; align-items: center; gap: 15px; }
        .setting-row label { flex: 1; font-size: 14px; color: #8e8e93; }
        input[type=range] { flex: 2; height: 30px; }
        
        #menu-trigger { 
            position: absolute; top: 15px; right: 15px; background: rgba(255,255,255,0.1);
            border: none; color: white; padding: 8px 15px; border-radius: 12px; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="top-view">
        <div id="camera-card">
            <video id="video" autoplay playsinline></video>
            <div id="scan-zone"></div>
            <button id="menu-trigger" onclick="toggleSettings()">⚙️ SETTINGS</button>
        </div>
    </div>

    <div id="bottom-view">
        <div id="room-display">
            <span class="room-label">ACTIVE CALL</span>
            <div id="room-number-main" class="room-val">--</div>
        </div>

        <div class="control-grid">
            <div class="info-tile">
                <span class="info-label">Remaining Time</span>
                <div id="timer-text">READY</div>
            </div>
            <div class="info-tile">
                <span class="info-label">Repeat Every</span>
                <div id="repeat-label" style="font-weight:bold;">2 Mins</div>
            </div>
        </div>

        <button id="action-btn" class="btn-start" onclick="handleAction()">
            <span>START SYSTEM</span>
        </button>
    </div>

    <div id="settings-overlay">
        <h2 style="margin-top:0">System Calibration</h2>
        <div class="setting-row"><label>Box Width</label><input type="range" id="w" min="50" max="600" value="300"></div>
        <div class="setting-row"><label>Box Height</label><input type="range" id="h" min="20" max="300" value="80"></div>
        <div class="setting-row"><label>Y-Position</label><input type="range" id="y" min="-40" max="40" value="0"></div>
        <div class="setting-row"><label>Repeat (Min)</label><input type="range" id="rep" min="1" max="10" value="2"></div>
        <button onclick="toggleSettings()" style="width:100%; padding:15px; border-radius:15px; background:var(--ios-blue); color:white; border:none; font-weight:bold;">CLOSE & SAVE</button>
    </div>

    <script>
        const video = document.getElementById('video');
        const actionBtn = document.getElementById('action-btn');
        const scanZone = document.getElementById('scan-zone');
        const roomMain = document.getElementById('room-number-main');
        const timerText = document.getElementById('timer-text');
        
        let isRunning = false;
        let timeLeft = 0;
        let lastAnnounced = "";
        let synth = window.speechSynthesis;

        function toggleSettings() {
            const s = document.getElementById('settings-overlay');
            s.style.display = s.style.display === 'block' ? 'none' : 'block';
        }

        // Live update box position
        function updateLayout() {
            const w = document.getElementById('w').value;
            const h = document.getElementById('h').value;
            const y = document.getElementById('y').value;
            scanZone.style.width = w + 'px';
            scanZone.style.height = h + 'px';
            scanZone.style.left = `calc(50% - ${w/2}px)`;
            scanZone.style.top = `calc(50% + ${y}% - ${h/2}px)`;
            document.getElementById('repeat-label').innerText = document.getElementById('rep').value + " Mins";
        }
        document.querySelectorAll('input').forEach(i => i.oninput = updateLayout);
        updateLayout();

        async function handleAction() {
            if (isRunning) {
                location.reload();
                return;
            }

            // iOS Audio Unlock
            const unlock = new SpeechSynthesisUtterance("System Started");
            unlock.volume = 0; // Quiet unlock
            synth.speak(unlock);

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: 1280 } 
                });
                video.srcObject = stream;
                isRunning = true;
                actionBtn.className = "btn-stop";
                actionBtn.innerText = "STOP SYSTEM";
                startProcessing();
                setInterval(updateTimer, 1000);
            } catch (err) {
                alert("Camera access denied.");
            }
        }

        function speak(text) {
            synth.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.rate = 0.9;
            synth.speak(msg);
        }

        function startProcessing() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            setInterval(async () => {
                if (!isRunning || !video.videoWidth) return;

                // Crop logic based on scan zone
                const factor = video.videoWidth / video.offsetWidth;
                const cw = document.getElementById('w').value * factor;
                const ch = document.getElementById('h').value * factor;
                const cx = (video.videoWidth / 2) - (cw / 2);
                const cy = (video.videoHeight / 2) + (document.getElementById('y').value / 100 * video.videoHeight) - (ch / 2);

                canvas.width = cw; canvas.height = ch;
                ctx.drawImage(video, cx, cy, cw, ch, 0, 0, cw, ch);

                const { data: { text } } = await Tesseract.recognize(canvas, 'eng');
                const clean = text.replace(/\D/g, "");
                
                if (clean.length >= 2) {
                    const room = clean.slice(-2); // Take last 2 digits
                    roomMain.innerText = room;
                    
                    if (room !== lastAnnounced) {
                        lastAnnounced = room;
                        speak("Room " + room);
                        timeLeft = document.getElementById('rep').value * 60;
                    }
                }
            }, 2000);
        }

        function updateTimer() {
            if (!isRunning || lastAnnounced === "") return;
            
            if (timeLeft <= 0) {
                speak("Room " + lastAnnounced);
                timeLeft = document.getElementById('rep').value * 60;
            } else {
                timeLeft--;
                const m = Math.floor(timeLeft / 60);
                const s = timeLeft % 60;
                timerText.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
            }
        }
    </script>
</body>
</html>
