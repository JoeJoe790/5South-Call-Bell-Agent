<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover">
    <title>Smart Call Bell - Safari Optimized</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root { 
            --bg: #000000; 
            --tile: #1c1c1e; 
            --accent-red: #ff453a; 
            --accent-green: #30d158; 
            --accent-amber: #ff9f0a; 
            --accent-purple: #af52de;
            --text-main: #ffffff;
        }
        
        /* Using dvh (dynamic viewport height) to account for Safari bars */
        body { 
            margin: 0; 
            background: var(--bg); 
            color: var(--text-main); 
            font-family: -apple-system, system-ui, sans-serif; 
            overflow: hidden; 
            height: 100dvh; 
            display: flex; 
            flex-direction: column;
            padding-bottom: env(safe-area-inset-bottom); /* iOS Safe Area */
        }
        
        /* TOP: FIXED CAMERA */
        #cam-area { height: 35dvh; padding: 10px; box-sizing: border-box; flex-shrink: 0; }
        #cam-card { width: 100%; height: 100%; border-radius: 20px; overflow: hidden; position: relative; background: #111; border: 1px solid #333; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        #scan-box { position: absolute; border: 2px solid var(--accent-red); border-radius: 4px; pointer-events: none; z-index: 5; }

        /* MIDDLE: SCROLLABLE ROOMS */
        #room-list-container { 
            flex-grow: 1; 
            overflow-y: auto; /* Allow scrolling if rooms overflow */
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            -webkit-overflow-scrolling: touch;
        }
        .room-tile { 
            background: var(--tile); 
            border-radius: 20px; 
            width: 100%; 
            min-height: 120px; /* Minimum size to ensure visibility */
            display: flex; 
            align-items: center; 
            justify-content: center; 
            flex-shrink: 0;
        }
        .room-num { font-weight: 900; line-height: 1; letter-spacing: -4px; font-size: 80px; }

        /* BOTTOM: FIXED INTERACTION BAR (Elevated for Safari) */
        #bottom-controls { 
            height: 110px; 
            padding: 10px 10px 25px 10px; /* Extra bottom padding for Safari tabs */
            background: var(--bg);
            display: grid; 
            grid-template-columns: 1fr 1fr 1fr; 
            gap: 10px; 
            flex-shrink: 0;
            border-top: 1px solid #222;
        }
        .control-btn { 
            background: var(--tile); 
            border-radius: 18px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            border: none; 
            color: #000;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 14px;
        }
        
        #timer-box { color: var(--accent-amber); font-weight: bold; }
        #timer-clock { font-family: monospace; font-size: 20px; }

        /* SETTINGS */
        #settings-ui { 
            position: absolute; inset: 0; background: rgba(0,0,0,0.98); z-index: 100; display: none; padding: 40px 20px; 
            overflow-y: auto;
        }
        .s-row { margin-bottom: 25px; }
        .s-row label { display: block; font-size: 11px; font-weight: 800; color: #8e8e93; margin-bottom: 10px; }
        input[type=range] { width: 100%; height: 45px; }

        #cfg-btn { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.6); color: white; border: 1px solid #444; padding: 8px 12px; border-radius: 10px; font-size: 11px; font-weight: bold; z-index: 10; }
    </style>
</head>
<body>

    <div id="cam-area">
        <div id="cam-card">
            <video id="video" autoplay playsinline></video>
            <div id="scan-box"></div>
            <button id="cfg-btn" onclick="openCfg()">SETTINGS</button>
        </div>
    </div>

    <div id="room-list-container">
        <div class="room-tile"><div class="room-num" style="color:#222;">--</div></div>
    </div>

    <div id="bottom-controls">
        <div class="control-btn" id="timer-box">
            <span style="font-size: 9px; opacity: 0.8;">REMAINING</span>
            <div id="timer-clock">00:00</div>
        </div>
        <button id="mainBtn" class="control-btn" style="background: var(--accent-green);" onclick="togglePower()">START</button>
        <button id="muteBtn" class="control-btn" style="background: var(--accent-purple); color: white;" onclick="toggleMute()">MUTE</button>
    </div>

    <div id="settings-ui">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <h3 style="margin:0; color:var(--accent-green);">CONFIGURATION</h3>
            <button onclick="closeCfg()" style="background:var(--accent-red); color:white; border:none; padding:12px 20px; border-radius:12px; font-weight:bold;">SAVE & CLOSE</button>
        </div>
        <div class="s-row"><label>SENSITIVITY (THRESHOLD)</label><input type="range" id="threshold" min="50" max="220" value="140"></div>
        <div class="s-row"><label>REPEAT MINUTES: <span id="repLabel" style="color:white">2</span></label><input type="range" id="repeat" min="1" max="15" value="2"></div>
        <div class="s-row"><label>SCAN BOX WIDTH</label><input type="range" id="boxW" min="100" max="800" value="380"></div>
        <div class="s-row"><label>SCAN BOX HEIGHT</label><input type="range" id="boxH" min="30" max="300" value="90"></div>
        <div class="s-row"><label>VERTICAL ALIGN</label><input type="range" id="boxY" min="-50" max="50" value="0"></div>
    </div>

    <script>
        const video = document.getElementById('video');
        const roomContainer = document.getElementById('room-list-container');
        const timerClock = document.getElementById('timer-clock');
        const scanBox = document.getElementById('scan-box');
        const mainBtn = document.getElementById('mainBtn');
        const muteBtn = document.getElementById('muteBtn');
        
        let synth = window.speechSynthesis;
        let samVoice = null;
        let activeRooms = []; let lastRooms = ""; let countdown = 0;
        let isRunning = false; let isMuted = false;
        let scanTimer, clockTimer;

        function openCfg() { document.getElementById('settings-ui').style.display = 'block'; }
        function closeCfg() { document.getElementById('settings-ui').style.display = 'none'; }

        function findSamantha() {
            const voices = synth.getVoices();
            samVoice = voices.find(v => v.name.includes("Samantha")) || voices.find(v => v.lang.includes("en-US")) || voices[0];
        }
        if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = findSamantha;

        function updateSettings() {
            const w = document.getElementById('boxW').value, h = document.getElementById('boxH').value, y = document.getElementById('boxY').value;
            scanBox.style.width = w + 'px'; scanBox.style.height = h + 'px';
            scanBox.style.left = `calc(50% - ${w/2}px)`;
            scanBox.style.top = `calc(50% + ${y}% - ${h/2}px)`;
            document.getElementById('repLabel').innerText = document.getElementById('repeat').value;
        }
        document.querySelectorAll('input').forEach(i => i.oninput = updateSettings);
        updateSettings();

        async function togglePower() {
            if (isRunning) { location.reload(); return; }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: 1280, height: 720 } });
                video.srcObject = stream;
                isRunning = true;
                mainBtn.innerText = "STOP";
                mainBtn.style.background = "var(--accent-red)";
                startEngine();
                clockTimer = setInterval(tick, 1000);
                synth.speak(new SpeechSynthesisUtterance("")); // Unlock iOS Audio
            } catch (e) { alert("Enable camera in settings."); }
        }

        function toggleMute() {
            isMuted = !isMuted;
            muteBtn.innerText = isMuted ? "UNMUTE" : "MUTE";
            muteBtn.style.background = isMuted ? "var(--accent-red)" : "var(--accent-purple)";
            if (isMuted) synth.cancel();
        }

        async function startEngine() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            
            scanTimer = setInterval(async () => {
                if (!isRunning || !video.videoWidth) return;

                const sx = video.videoWidth / video.offsetWidth;
                const sy = video.videoHeight / video.offsetHeight;
                const w = document.getElementById('boxW').value * sx;
                const h = document.getElementById('boxH').value * sy;
                const x = (video.videoWidth/2) - (w/2);
                const y = (video.videoHeight/2) + ((document.getElementById('boxY').value/100)*video.videoHeight) - (h/2);

                canvas.width = w; canvas.height = h;
                ctx.drawImage(video, x, y, w, h, 0, 0, w, h);

                let imgData = ctx.getImageData(0,0,w,h);
                let d = imgData.data; let th = document.getElementById('threshold').value;
                for (let i=0; i<d.length; i+=4) {
                    let avg = (d[i]+d[i+1]+d[i+2])/3;
                    d[i] = d[i+1] = d[i+2] = avg > th ? 255 : 0;
                }
                ctx.putImageData(imgData, 0, 0);

                const { data: { text } } = await Tesseract.recognize(canvas, 'eng');
                const detected = (text.match(/\d{4}/g) || []).map(n => n.slice(2)).filter((v,i,a) => a.indexOf(v)===i).sort();

                if (detected.length > 0) {
                    activeRooms = detected;
                    renderRooms();
                    if (activeRooms.join(",") !== lastRooms) {
                        lastRooms = activeRooms.join(",");
                        announce();
                        countdown = document.getElementById('repeat').value * 60;
                    }
                } else {
                    activeRooms = [];
                    roomContainer.innerHTML = `<div class="room-tile"><div class="room-num" style="color:#222;">--</div></div>`;
                }
            }, 2500);
        }

        function renderRooms() {
            roomContainer.innerHTML = activeRooms.map(r => `<div class="room-tile"><div class="room-num">${r}</div></div>`).join('');
        }

        function announce() {
            if (activeRooms.length === 0 || isMuted) return;
            synth.cancel();
            const text = (activeRooms.length > 1 ? "Rooms " : "Room ") + activeRooms.join(" and ");
            const speech = new SpeechSynthesisUtterance(text);
            if (samVoice) speech.voice = samVoice;
            speech.rate = 0.85;
            synth.speak(speech);
        }

        function tick() {
            if (activeRooms.length > 0) {
                if (countdown <= 0) { announce(); countdown = document.getElementById('repeat').value * 60; }
                else { 
                    countdown--; 
                    timerClock.innerText = Math.floor(countdown/60).toString().padStart(2,'0') + ":" + (countdown%60).toString().padStart(2,'0');
                }
            } else { timerClock.innerText = "00:00"; }
        }
    </script>
</body>
</html>
