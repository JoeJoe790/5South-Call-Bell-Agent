<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover">
    <title>Smart Call Bell - iOS Pro v6</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root { 
            --bg: #000000; --tile: #1c1c1e; --accent-red: #ff453a; 
            --accent-green: #30d158; --accent-amber: #ff9f0a; 
            --text-main: #ffffff; --text-dim: #8e8e93;
        }
        body { margin: 0; background: var(--bg); color: var(--text-main); font-family: -apple-system, sans-serif; overflow: hidden; height: 100dvh; display: flex; flex-direction: column; }
        
        #main-wrapper { display: flex; flex-direction: column; width: 100%; height: 100%; position: relative; }
        
        #cam-area { height: 35dvh; padding: 10px; box-sizing: border-box; z-index: 100; flex-shrink: 0; }
        #cam-card { width: 100%; height: 100%; border-radius: 24px; overflow: hidden; position: relative; background: #111; border: 1px solid #333; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        #scan-box { position: absolute; border: 2px solid var(--accent-red); border-radius: 6px; pointer-events: none; z-index: 20; }
        
        #interaction-pane { flex-grow: 1; position: relative; overflow: hidden; display: flex; flex-direction: column; }

        #room-area { height: 75%; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 12px; padding: 10px; box-sizing: border-box; }
        .room-tile { background: var(--tile); width: 95%; height: 45%; border-radius: 40px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .room-num { font-weight: 900; line-height: 1; letter-spacing: -5px; color: white; margin: 0; }

        #bottom-controls { height: 25%; display: grid; grid-template-columns: 1fr 1.2fr 1fr; gap: 10px; padding: 10px 15px calc(10px + env(safe-area-inset-bottom)); border-top: 1px solid #222; box-sizing: border-box; }
        .control-tile { background: var(--tile); border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: none; font-weight: 800; text-transform: uppercase; font-size: 11px; color: white; }
        
        #settings-view { 
            position: absolute; inset: 0; 
            background: var(--bg); 
            z-index: 150; 
            display: none; 
            padding: 20px; 
            overflow-y: auto; 
            box-sizing: border-box; 
        }
        #settings-view.open { display: block; }
        
        .s-row { display: flex; align-items: center; margin-bottom: 20px; gap: 15px; }
        .s-row label { flex: 0 0 100px; font-size: 10px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; }
        input[type=range] { flex: 1; height: 10px; -webkit-appearance: none; background: #333; border-radius: 5px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 26px; height: 26px; border-radius: 50%; background: white; border: none; }
        select, .btn-test { background: #333; color: white; border: 1px solid #444; padding: 12px; border-radius: 14px; flex: 1; font-weight: bold; }
        .btn-test { background: var(--accent-green); color: black; border: none; margin-top: 10px; width: 100%; }
        
        #cfg-toggle { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.6); color: white; border: none; padding: 8px 14px; border-radius: 12px; font-size: 10px; font-weight: bold; z-index: 200; }

        @media (orientation: landscape) {
            #main-wrapper { flex-direction: row; }
            #cam-area { width: 40vw; height: 100dvh; }
            #interaction-pane { width: 60vw; height: 100dvh; border-left: 1px solid #333; }
        }
    </style>
</head>
<body>

<div id="main-wrapper">
    <div id="cam-area">
        <div id="cam-card">
            <video id="video" autoplay playsinline></video>
            <div id="scan-box"></div>
            <button id="cfg-toggle" onclick="toggleCfg()">SETTINGS</button>
        </div>
    </div>

    <div id="interaction-pane">
        <div id="room-area">
            <div class="room-tile"><div class="room-num" style="color:#222; font-size: 80px;">--</div></div>
        </div>
        <div id="bottom-controls">
            <div class="control-tile" style="color:var(--accent-amber);"><span style="font-size: 8px; opacity: 0.7;">REMAINING</span><div id="timer-clock">00:00</div></div>
            <button id="mainBtn" class="control-tile" style="background:var(--accent-green); color:black;" onclick="handlePower()">START</button>
            <button id="muteBtn" class="control-tile" style="color:var(--accent-amber);" onclick="toggleMute()">MUTE</button>
        </div>

        <div id="settings-view">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
                <h2 style="color:var(--accent-green); margin:0;">Calibration</h2>
                <button onclick="toggleCfg()" style="background:none; border:none; color:var(--accent-red); font-weight:900; font-size: 16px;">CLOSE</button>
            </div>
            <div class="s-row"><label>Box Width</label><input type="range" id="boxW" min="50" max="1000" value="380"></div>
            <div class="s-row"><label>Box Height</label><input type="range" id="boxH" min="20" max="500" value="90"></div>
            <div class="s-row"><label>Horizontal</label><input type="range" id="boxX" min="-50" max="50" value="0"></div>
            <div class="s-row"><label>Vertical</label><input type="range" id="boxY" min="-50" max="50" value="0"></div>
            <div class="s-row"><label>Contrast</label><input type="range" id="thresh" min="50" max="220" value="140"></div>
            <div class="s-row"><label>Repeat Alert</label><input type="range" id="repeat" min="1" max="15" value="3"><span id="vR" style="color:var(--accent-amber); font-weight:bold; width: 40px; text-align: right;">3m</span></div>
            <div class="s-row"><label>Volume</label><input type="range" id="vol" min="0" max="1" step="0.1" value="0.9"></div>
            <div class="s-row"><label>Choose Voice</label><select id="voiceSel"></select></div>
            <button class="btn-test" onclick="testAudio()">TEST AUDIO</button>
        </div>
    </div>
</div>

<script>
    const video = document.getElementById('video'), roomArea = document.getElementById('room-area');
    const timerClock = document.getElementById('timer-clock'), scanBox = document.getElementById('scan-box');
    const mainBtn = document.getElementById('mainBtn'), muteBtn = document.getElementById('muteBtn'), voiceSel = document.getElementById('voiceSel');
    const settingsView = document.getElementById('settings-view');
    let synth = window.speechSynthesis, activeRooms = [], lastSetString = "", countdown = 0, isRunning = false, isMuted = false, engine, stream, voices = [];
    
    // ACCURACY BUFFER
    let voteCounter = {}; 

    function toggleCfg() { settingsView.classList.toggle('open'); }
    
    function loadVoices() {
        voices = synth.getVoices().filter(v => v.lang.includes('en'));
        voiceSel.innerHTML = voices.map((v, i) => `<option value="${i}">${v.name}</option>`).join('');
    }
    if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = loadVoices; 
    loadVoices();

    function updateSettings() {
        const w = document.getElementById('boxW').value, h = document.getElementById('boxH').value;
        const x = document.getElementById('boxX').value, y = document.getElementById('boxY').value;
        scanBox.style.width = w + 'px'; scanBox.style.height = h + 'px';
        scanBox.style.left = `calc(50% + ${x}% - ${w/2}px)`; 
        scanBox.style.top = `calc(50% + ${y}% - ${h/2}px)`;
        document.getElementById('vR').innerText = document.getElementById('repeat').value + 'm';
        render();
    }
    document.querySelectorAll('input').forEach(i => i.oninput = updateSettings); 
    updateSettings();

    async function handlePower() {
        if (!isRunning) {
            try {
                if (synth.paused) synth.resume();
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } } });
                video.srcObject = stream; isRunning = true; 
                mainBtn.innerText = "STOP"; mainBtn.style.background = "var(--accent-red)";
                startEngine(); setInterval(tick, 1000);
            } catch (e) { alert("Camera access denied."); }
        } else {
            isRunning = false; clearInterval(engine); 
            if (stream) stream.getTracks().forEach(t => t.stop());
            video.srcObject = null; mainBtn.innerText = "START"; mainBtn.style.background = "var(--accent-green)";
            activeRooms = []; render();
        }
    }

    function toggleMute() { isMuted = !isMuted; muteBtn.innerText = isMuted ? "UNMUTE" : "MUTE"; muteBtn.style.color = isMuted ? "var(--accent-red)" : "var(--accent-amber)"; }

    function startEngine() {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        
        engine = setInterval(async () => {
            if (!isRunning || !video.videoWidth) return;
            
            const sx = video.videoWidth/video.offsetWidth, sy = video.videoHeight/video.offsetHeight;
            const w = document.getElementById('boxW').value*sx, h = document.getElementById('boxH').value*sy;
            const x = (video.videoWidth/2)+((document.getElementById('boxX').value/100)*video.videoWidth)-(w/2);
            const y = (video.videoHeight/2)+((document.getElementById('boxY').value/100)*video.videoHeight)-(h/2);
            
            canvas.width = w; canvas.height = h;
            ctx.drawImage(video, x, y, w, h, 0, 0, w, h);

            // PRE-PROCESSING FOR ACCURACY (Thinning the "Fat" pixels)
            const imgData = ctx.getImageData(0,0,w,h);
            const data = imgData.data;
            const thresh = document.getElementById('thresh').value;
            for (let i = 0; i < data.length; i += 4) {
                const brightness = (data[i] + data[i+1] + data[i+2]) / 3;
                const v = brightness > thresh ? 255 : 0;
                data[i] = data[i+1] = data[i+2] = v;
            }
            ctx.putImageData(imgData, 0, 0);

            const { data: { text, words } } = await Tesseract.recognize(canvas, 'eng', {
                tessedit_char_whitelist: '0123456789',
                tessjs_create_hocr: '0'
            });

            // Filtering: Look for 4-digit numbers, then grab the last 2 digits
            // This ignores random "00" or single digit noise.
            const validNumbers = words
                .filter(word => word.confidence > 70)
                .map(word => word.text.replace(/[^0-9]/g, ''))
                .filter(num => num.length >= 2 && num !== "00")
                .map(num => num.length >= 4 ? num.substring(num.length - 2) : num);

            if (validNumbers.length > 0) {
                const topMatch = validNumbers[0];
                
                // VOTING SYSTEM: Increment count for this number
                voteCounter[topMatch] = (voteCounter[topMatch] || 0) + 1;

                // Only confirm room if seen 3 times
                if (voteCounter[topMatch] >= 3) {
                    const found = [topMatch];
                    const newSetString = found.join(",");
                    if (newSetString !== lastSetString) {
                        activeRooms = found; lastSetString = newSetString;
                        render(); announce(); countdown = document.getElementById('repeat').value * 60;
                    }
                    voteCounter = {}; // Reset votes after finding a match
                }
            } else { 
                // Gradually clear if nothing seen
                activeRooms = []; lastSetString = ""; render(); 
                voteCounter = {};
            }
        }, 1200); // Faster scan for better responsiveness
    }

    function render() {
        const count = activeRooms.length, isL = window.innerWidth > window.innerHeight;
        const fs = isL ? (count === 1 ? '55dvh' : '28dvh') : (count === 1 ? '35dvh' : '22dvh');
        if (activeRooms.length === 0) {
            roomArea.innerHTML = `<div class="room-tile"><div class="room-num" style="color:#222; font-size: 80px;">--</div></div>`;
            return;
        }
        roomArea.innerHTML = activeRooms.map(r => `<div class="room-tile"><div class="room-num" style="font-size: ${fs}">${r}</div></div>`).join('');
    }

    function announce() {
        if (activeRooms.length === 0 || isMuted) return;
        synth.cancel();
        const msg = new SpeechSynthesisUtterance("Room " + activeRooms.join(", "));
        if(voices.length > 0) msg.voice = voices[voiceSel.value];
        msg.volume = document.getElementById('vol').value;
        synth.speak(msg);
    }

    function testAudio() { 
        const msg = new SpeechSynthesisUtterance("Voice active");
        if(voices.length > 0) msg.voice = voices[voiceSel.value];
        msg.volume = 0.1;
        synth.speak(msg); 
    }

    function tick() {
        if (activeRooms.length > 0 && isRunning) {
            if (countdown <= 0) { announce(); countdown = document.getElementById('repeat').value * 60; }
            else { countdown--; timerClock.innerText = Math.floor(countdown/60).toString().padStart(2,'0') + ":" + (countdown%60).toString().padStart(2,'0'); }
        } else { timerClock.innerText = "00:00"; }
    }
    window.addEventListener('resize', render);
</script>
</body>
</html>
