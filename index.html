<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Room Monitor</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
body {
    margin: 0;
    background: #111;
    font-family: system-ui;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

/* VIDEO */
#video-container {
    flex: 1;
    position: relative;
}
#video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* 🔴 SCAN BOX */
#scan-box {
    position: absolute;
    border: 3px solid #ff3b30;
    border-radius: 6px;
    box-shadow: 0 0 12px rgba(255,59,48,0.7);
}

/* DASHBOARD */
#dashboard {
    height: 35vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* 🟢 ROOM TEXT */
#room-display {
    font-size: 7rem;
    font-weight: 800;
    color: #28cd41;
    text-align: center;
}

/* STATUS */
#status {
    color: #aaa;
    margin-top: 8px;
}

button {
    padding: 12px 20px;
    border: none;
    background: #222;
    color: white;
    border-radius: 6px;
}
</style>
</head>

<body>

<div id="video-container">
    <video id="video" autoplay playsinline></video>
    <div id="scan-box"></div>
</div>

<div id="dashboard">
    <button id="startBtn">Start</button>
    <div id="room-display"></div>
    <div id="status">Idle</div>
</div>

<script>
const video = document.getElementById('video');
const startBtn = document.getElementById('startBtn');
const roomDisplay = document.getElementById('room-display');
const status = document.getElementById('status');
const scanBox = document.getElementById('scan-box');

let activeRooms = [];
let lastSeenTime = 0;

/* 🔴 RESPONSIVE BOX (works for portrait + landscape) */
function updateBox() {
    const vw = window.innerWidth;
    const vh = window.innerHeight;

    const boxWidth = vw * 0.6;   // 60% width
    const boxHeight = vh * 0.12; // 12% height

    scanBox.style.width = boxWidth + "px";
    scanBox.style.height = boxHeight + "px";

    scanBox.style.left = "50%";
    scanBox.style.top = "50%";
    scanBox.style.transform = "translate(-50%, -50%)";
}

window.addEventListener("resize", updateBox);
updateBox();

/* 📷 FORCE BACK CAMERA */
startBtn.onclick = async () => {
    const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { exact: "environment" } }
    });

    video.srcObject = stream;
    startBtn.style.display = "none";
    status.innerText = "Scanning...";

    startScanning();
};

/* 🔥 IMAGE PROCESSING */
function preprocess(ctx, w, h) {
    const img = ctx.getImageData(0, 0, w, h);
    const d = img.data;

    for (let i = 0; i < d.length; i += 4) {
        let gray = (d[i] + d[i+1] + d[i+2]) / 3;
        gray = gray > 140 ? 255 : 0;
        d[i] = d[i+1] = d[i+2] = gray;
    }

    ctx.putImageData(img, 0, 0);
}

/* 🔥 SCANNING */
async function startScanning() {
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    setInterval(async () => {
        if (!video.videoWidth) return;

        const vw = video.videoWidth;
        const vh = video.videoHeight;

        // 🎯 dynamic crop (matches box visually)
        const w = vw * 0.6;
        const h = vh * 0.12;
        const x = (vw - w) / 2;
        const y = (vh - h) / 2;

        canvas.width = w;
        canvas.height = h;

        ctx.drawImage(video, x, y, w, h, 0, 0, w, h);

        preprocess(ctx, w, h);

        const { data: { text } } = await Tesseract.recognize(canvas, "eng");

        const found = (text.match(/\d{4}/g) || [])
            .map(n => parseInt(n.slice(-2)))
            .filter(n => n >= 1 && n <= 60)
            .map(n => n.toString().padStart(2, "0"));

        if (found.length) {
            activeRooms = [...new Set(found)];
            lastSeenTime = Date.now();

            roomDisplay.innerText = activeRooms.join(" ");
            status.innerText = "Detected";
        } else {
            if (Date.now() - lastSeenTime > 3000) {
                roomDisplay.innerText = "";
                status.innerText = "Searching...";
            }
        }

    }, 1500);
}
</script>

</body>
</html>
