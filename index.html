<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Room Monitor</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
body {
    margin: 0;
    background: #111;
    color: #e5e5e5;
    font-family: system-ui, -apple-system, Segoe UI, Roboto;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

/* VIDEO */
#video-container {
    flex: 1;
    position: relative;
    background: black;
}
#video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* 🔴 SCAN BOX (FIXED) */
#scan-box {
    position: absolute;
    border: 3px solid #ff3b30;
    border-radius: 6px;
    box-shadow: 0 0 12px rgba(255, 59, 48, 0.7);
}

/* HEADER */
#header {
    position: absolute;
    top: 12px;
    left: 12px;
    right: 12px;
    display: flex;
    justify-content: space-between;
    font-size: 0.85rem;
    color: #bbb;
}

/* BUTTON */
button {
    background: #1e1e1e;
    border: 1px solid #444;
    color: #ddd;
    padding: 8px 12px;
    border-radius: 6px;
    cursor: pointer;
}

/* DASHBOARD */
#dashboard {
    height: 38vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* 🟢 ROOM DISPLAY (FIXED) */
#room-display {
    font-size: 7rem;
    font-weight: 800;
    letter-spacing: 5px;
    color: #28cd41;
}

/* TIMER */
#timer-display {
    margin-top: 10px;
    font-size: 0.9rem;
    color: #aaa;
}

/* SETTINGS PANEL */
#settings {
    position: fixed;
    right: -300px;
    top: 0;
    width: 260px;
    height: 100%;
    background: #181818;
    padding: 20px;
    border-left: 1px solid #333;
    transition: 0.25s;
}
#settings.open { right: 0; }

label {
    font-size: 0.75rem;
    color: #888;
}

input, select {
    width: 100%;
    margin: 5px 0 12px;
}

/* START BUTTON */
#startBtn {
    padding: 16px 28px;
    font-size: 1.1rem;
}
</style>
</head>

<body>

<div id="video-container">
    <video id="video" autoplay playsinline></video>
    <div id="scan-box"></div>

    <div id="header">
        <div id="status">Idle</div>
        <button onclick="toggleSettings()">Settings</button>
    </div>
</div>

<div id="dashboard">
    <button id="startBtn">Start</button>
    <div id="room-display"></div>
    <div id="timer-display"></div>
</div>

<div id="settings">
    <h3 style="margin-top:0;">Settings</h3>

    <label>Width</label>
    <input type="range" id="boxW" min="50" max="450" value="220">

    <label>Height</label>
    <input type="range" id="boxH" min="30" max="350" value="100">

    <label>Horizontal</label>
    <input type="range" id="boxX" min="-45" max="45" value="0">

    <label>Vertical</label>
    <input type="range" id="boxY" min="-45" max="45" value="0">

    <label>Repeat (minutes)</label>
    <input type="range" id="repSlider" min="1" max="15" value="2">

    <label>Voice</label>
    <select id="voiceSelect"></select>

    <label>Volume</label>
    <input type="range" id="vol" min="0" max="1" step="0.1" value="1">

    <button onclick="toggleSettings()">Close</button>
</div>

<script>
const video = document.getElementById('video');
const startBtn = document.getElementById('startBtn');
const roomDisplay = document.getElementById('room-display');
const timerDisplay = document.getElementById('timer-display');
const status = document.getElementById('status');

const boxW = document.getElementById('boxW');
const boxH = document.getElementById('boxH');
const boxX = document.getElementById('boxX');
const boxY = document.getElementById('boxY');
const scanBox = document.getElementById('scan-box');

let synth = speechSynthesis;
let activeRooms = [];
let lastDetectedTime = 0;
let lastSpoken = 0;
let timeLeft = 0;

function toggleSettings() {
    document.getElementById('settings').classList.toggle('open');
}

/* scan box */
function updateBox() {
    scanBox.style.width = boxW.value + 'px';
    scanBox.style.height = boxH.value + 'px';
    scanBox.style.left = `calc(50% + ${boxX.value}% - ${boxW.value/2}px)`;
    scanBox.style.top = `calc(50% + ${boxY.value}% - ${boxH.value/2}px)`;
}
[boxW, boxH, boxX, boxY].forEach(el => el.oninput = updateBox);
updateBox();

/* voices */
function loadVoices() {
    voiceSelect.innerHTML = synth.getVoices().map(v => `<option>${v.name}</option>`).join('');
}
synth.onvoiceschanged = loadVoices;
loadVoices();

/* start */
startBtn.onclick = async () => {
    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    video.srcObject = stream;
    startBtn.style.display = 'none';
    status.innerText = "Active";

    scanLoop();
    setInterval(timerTick, 1000);
};

async function scanLoop() {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');

    setInterval(async () => {
        if (!video.videoWidth) return;

        const w = boxW.value;
        const h = boxH.value;

        canvas.width = w;
        canvas.height = h;

        ctx.filter = "grayscale(1) contrast(2)";
        ctx.drawImage(video, 0, 0, w, h);

        const { data: { text } } = await Tesseract.recognize(canvas, 'eng');

        const found = (text.match(/\d{4}/g) || [])
            .map(n => parseInt(n.substring(2)))
            .filter(n => n >= 1 && n <= 60)
            .map(n => n.toString().padStart(2,'0'));

        if (found.length) {
            activeRooms = [...new Set(found)];
            lastDetectedTime = Date.now();
            roomDisplay.innerText = activeRooms.join(" ");

            if (Date.now() - lastSpoken > 5000) {
                speak();
                timeLeft = repSlider.value * 60;
            }
        } else {
            if (Date.now() - lastDetectedTime > 3000) {
                activeRooms = [];
                roomDisplay.innerText = "";
            }
        }

    }, 2500);
}

function speak() {
    lastSpoken = Date.now();

    let msg = activeRooms.length === 1
        ? "Room " + activeRooms[0]
        : "Rooms " + activeRooms.join(", ");

    let ut = new SpeechSynthesisUtterance(msg);
    ut.volume = vol.value;
    ut.voice = synth.getVoices().find(v => v.name === voiceSelect.value);
    synth.speak(ut);
}

function timerTick() {
    if (activeRooms.length) {
        if (timeLeft <= 0) {
            speak();
            timeLeft = repSlider.value * 60;
        } else {
            timeLeft--;
            timerDisplay.innerText = `${Math.floor(timeLeft/60)}m ${timeLeft%60}s`;
        }
    }
}
</script>

</body>
</html>
