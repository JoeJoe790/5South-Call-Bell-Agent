<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover">
    <title>Smart Call Bell - Pro Calibration v2</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root { 
            --bg: #000000; 
            --tile: #1c1c1e; 
            --accent-red: #ff453a; 
            --accent-green: #30d158; 
            --accent-amber: #ff9f0a; 
            --text-main: #ffffff;
            --text-dim: #8e8e93;
            --settings-card-bg: rgba(28, 28, 30, 0.95);
        }

        body { 
            margin: 0; background: var(--bg); color: var(--text-main); 
            font-family: -apple-system, system-ui, sans-serif; 
            overflow: hidden; height: 100dvh; display: flex; flex-direction: column;
        }

        /* Standard Layout: Top Camera, Bottom Number */
        #main-wrapper { display: flex; flex-direction: column; width: 100%; height: 100%; position: relative; }
        
        /* Fixed Camera Area (Top 40%) */
        #cam-area { height: 40dvh; padding: 10px; box-sizing: border-box; flex-shrink: 0; z-index: 10; }
        #cam-card { width: 100%; height: 100%; border-radius: 20px; overflow: hidden; position: relative; background: #111; border: 1px solid #333; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        
        /* The Red Scan Box: Critical Visibility */
        #scan-box { position: absolute; border: 2px solid var(--accent-red); border-radius: 6px; pointer-events: none; z-index: 20; }
        
        /* Middle (50%) Numbers */
        #room-area { height: 50dvh; display: flex; flex-direction: column; justify-content: center; align-items: center; overflow: hidden; z-index: 5; }
        
        /* Bottom (10%) Tiles (Mute and Remain match Timer color) */
        #bottom-controls { 
            height: 10dvh; display: grid; grid-template-columns: 1fr 1.2fr 1fr; gap: 8px; 
            padding: 5px 10px calc(5px + env(safe-area-inset-bottom)); 
            border-top: 1px solid #44444433; box-sizing: border-box; z-index: 10;
        }
        .control-tile { 
            background: var(--tile); border-radius: 15px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            border: none; font-weight: 800; text-transform: uppercase; font-size: 11px; 
        }
        .timer-theme { color: var(--accent-amber); }

        /* FIXED VISIBILITY: 70% Height Floating Settings Card */
        #settings-ui { 
            position: absolute; 
            top: 15dvh; /* 15% top padding */
            left: 5%; width: 90%; /* 90% wide */
            height: 70dvh; /* 70% height means 15% top and 15% bottom remain clear */
            background: var(--settings-card-bg); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 100; display: none; padding: 25px 20px; overflow-y: auto; box-sizing: border-box;
            border: 1px solid #444;
        }
        #settings-ui.open { display: block; }
        
        .settings-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .settings-header h2 { color: var(--accent-green); margin: 0; font-size: 22px; }
        .close-btn { background: none; border: none; color: var(--accent-red); font-weight: 900; font-size: 16px; cursor: pointer; }

        /* Themed Rows: Label Left, Adjuster Right */
        .s-row { display: flex; align-items: center; margin-bottom: 20px; gap: 15px; }
        .s-row label { flex: 0 0 130px; font-size: 10px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; }
        
        /* SCREENSHOT-STYLE ADJUSTERS: Redesigned Sliders */
        .s-row input[type=range] { 
            flex: 1; height: 10px; -webkit-appearance: none; appearance: none;
            background: #2c2c2e; /* Dark thick track */
            border-radius: 5px; outline: none; margin: 0;
        }
        /* Slider handle (thumb) - Large Solid White Circle */
        .s-row input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 24px; height: 24px; border-radius: 50%;
            background: white; border: none; cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.4);
        }
        
        /* Numerical Value Display: Only for repeat alert */
        .s-val { flex: 0 0 45px; text-align: right; font-size: 14px; font-weight: bold; color: var(--accent-amber); }
        
        #cfg-toggle { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.5); color: white; border: 1px solid #444; padding: 6px 12px; border-radius: 10px; font-size: 10px; z-index: 30; }
        
        select, .btn-test { background: #2c2c2e; color: white; border: 1px solid #444; padding: 10px; border-radius: 10px; font-size: 12px; flex: 1; }
        .btn-test { background: var(--accent-green); color: black; font-weight: bold; text-transform: uppercase; margin-top: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div id="main-wrapper">
    <div id="cam-area">
        <div id="cam-card">
            <video id="video" autoplay playsinline></video>
            <div id="scan-box"></div>
            <button id="cfg-toggle" onclick="toggleCfg()">SETTINGS</button>
        </div>
    </div>
    
    <div id="room-area"><div class="room-num" style="color:#222; font-size: 100px;">--</div></div>
    
    <div id="bottom-controls">
        <div class="control-tile timer-theme"><span style="font-size: 8px; opacity: 0.7;">REMAINING</span><div id="timer-clock">00:00</div></div>
        <button id="mainBtn" class="control-tile" style="background:var(--accent-green); color:black;" onclick="togglePower()">START</button>
        <button id="muteBtn" class="control-tile timer-theme" onclick="toggleMute()">MUTE</button>
    </div>
</div>

<div id="settings-ui">
    <div class="settings-header">
        <h2>Calibration</h2>
        <button onclick="toggleCfg()" class="close-btn">CLOSE</button>
    </div>

    <div class="s-row"><label>Box Width</label><input type="range" id="boxW" min="50" max="1000" value="380"></div>
    <div class="s-row"><label>Box Height</label><input type="range" id="boxH" min="20" max="500" value="90"></div>
    <div class="s-row"><label>Horizontal</label><input type="range" id="boxX" min="-50" max="50" value="0"></div>
    <div class="s-row"><label>Vertical</label><input type="range" id="boxY" min="-50" max="50" value="0"></div>
    <div class="s-row"><label>Contrast</label><input type="range" id="thresh" min="50" max="220" value="140"></div>
    
    <div class="s-row">
        <label>Repeat Alert</label>
        <input type="range" id="repeat" min="1" max="15" value="2">
        <span class="s-val" id="vR">2m</span>
    </div>

    <div class="s-row"><label>Volume</label><input type="range" id="vol" min="0" max="1" step="0.1" value="0.9"></div>
    
    <div class="s-row"><label>Choose Voice</label><select id="voiceSel"></select></div>
    <div class="s-row"><label></label><button class="btn-test" onclick="testAudio()">Test Audio</button></div>
</div>

<script>
    const video = document.getElementById('video'), roomArea = document.getElementById('room-area');
    const timerClock = document.getElementById('timer-clock'), scanBox = document.getElementById('scan-box');
    const mainBtn = document.getElementById('mainBtn'), muteBtn = document.getElementById('muteBtn'), voiceSel = document.getElementById('voiceSel');
    let synth = window.speechSynthesis, activeRooms = [], lastSet = "", countdown = 0, isRunning = false, isMuted = false, engine, voices = [];

    // The card design ensures that when settings are open, the red box on the camera (top 40%) is still visible.
    function toggleCfg() { document.getElementById('settings-ui').classList.toggle('open'); }
    
    function loadVoices() {
        voices = synth.getVoices();
        voiceSel.innerHTML = voices.map((v, i) => `<option value="${i}">${v.name} (${v.lang})</option>`).join('');
    }
    synth.onvoiceschanged = loadVoices; loadVoices();

    function updateSettings() {
        const w = document.getElementById('boxW').value, h = document.getElementById('boxH').value;
        const x = document.getElementById('boxX').value, y = document.getElementById('boxY').value;
        scanBox.style.width = w + 'px'; scanBox.style.height = h + 'px';
        scanBox.style.left = `calc(50% + ${x}% - ${w/2}px)`; 
        scanBox.style.top = `calc(50% + ${y}% - ${h/2}px)`;
        document.getElementById('vR').innerText = document.getElementById('repeat').value + 'm';
    }
    document.querySelectorAll('input').forEach(i => i.oninput = updateSettings); updateSettings();

    function testAudio() {
        const msg = new SpeechSynthesisUtterance("Testing room audio alert");
        if(voices.length > 0) msg.voice = voices[voiceSel.value]; msg.volume = document.getElementById('vol').value;
        synth.speak(msg);
    }

    async function togglePower() {
        if (isRunning) { location.reload(); return; }
        const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: 1920, height: 1080 } });
        video.srcObject = s; isRunning = true;
        mainBtn.innerText = "STOP"; mainBtn.style.background = "var(--accent-red)";
        startEngine(); setInterval(tick, 1000);
    }

    function toggleMute() { isMuted = !isMuted; muteBtn.innerText = isMuted ? "UNMUTE" : "MUTE"; muteBtn.style.color = isMuted ? "var(--accent-red)" : "var(--accent-amber)"; }

    async function startEngine() {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        engine = setInterval(async () => {
            if (!isRunning || !video.videoWidth) return;
            const sx = video.videoWidth/video.offsetWidth, sy = video.videoHeight/video.offsetHeight;
            const w = document.getElementById('boxW').value*sx, h = document.getElementById('boxH').value*sy;
            const x = (video.videoWidth/2)+((document.getElementById('boxX').value/100)*video.videoWidth)-(w/2);
            const y = (video.videoHeight/2)+((document.getElementById('boxY').value/100)*video.videoHeight)-(h/2);
            canvas.width = w; canvas.height = h; ctx.drawImage(video, x, y, w, h, 0, 0, w, h);
            const { data: { text } } = await Tesseract.recognize(canvas, 'eng');
            const found = (text.match(/\d{4}/g) || []).map(n => n.slice(2)).filter((v,i,a) => a.indexOf(v)===i).sort();
            if (found.length > 0) {
                activeRooms = found; render();
                if (activeRooms.join(",") !== lastSet) { lastSet = activeRooms.join(","); announce(); countdown = document.getElementById('repeat').value * 60; }
            } else { activeRooms = []; roomArea.innerHTML = `<div class="room-num" style="color:#333; font-size: 80px;">--</div>`; }
        }, 2500);
    }

    function render() {
        const count = activeRooms.length, isL = window.innerWidth > window.innerHeight;
        // Adjust font size based on orientation to fill available middle space
        const fs = isL ? (count === 1 ? '55dvh' : '28dvh') : (count === 1 ? '40dvh' : '20dvh');
        roomArea.innerHTML = activeRooms.map(r => `<div class="room-num" style="font-size: ${fs}">${r}</div>`).join('');
    }

    function announce() {
        if (activeRooms.length === 0 || isMuted) return;
        synth.cancel();
        const msg = new SpeechSynthesisUtterance("Room " + activeRooms.join(" and "));
        if(voices.length > 0) msg.voice = voices[voiceSel.value]; msg.volume = document.getElementById('vol').value;
        synth.speak(msg);
    }

    function tick() {
        if (activeRooms.length > 0) {
            if (countdown <= 0) { announce(); countdown = document.getElementById('repeat').value * 60; }
            else { countdown--; timerClock.innerText = Math.floor(countdown/60).toString().padStart(2,'0') + ":" + (countdown%60).toString().padStart(2,'0'); }
        } else { timerClock.innerText = "00:00"; }
    }
    window.addEventListener('resize', render);
</script>
</body>
</html>
